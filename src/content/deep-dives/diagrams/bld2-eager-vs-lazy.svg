<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="ListView builds every row up front even off-screen, while ListView.builder builds only the rows scrolled into view and leaves off-screen rows unbuilt" style="max-width: 100%; height: auto;"><style>.bld2-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.bld2-title{font-size:16px;font-weight:600}.bld2-bad{font-size:13px;font-weight:600;fill:#dc2626}.bld2-good{font-size:13px;font-weight:600;fill:#10b981}.bld2-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#1e293b}.bld2-cap{font-size:11px;fill:#64748b}.bld2-grey{font-size:11px;fill:#94a3b8}</style><text x="360" y="28" text-anchor="middle" class="bld2-t bld2-title">Build all 10,000 rows, or only the ones you see</text><rect x="30" y="48" width="320" height="290" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="74" text-anchor="middle" class="bld2-t bld2-bad">ListView(children: [...])</text><rect x="120" y="86" width="140" height="40" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5" rx="5"/><text x="190" y="111" text-anchor="middle" class="bld2-t bld2-mn">Row 0 (built)</text><rect x="120" y="132" width="140" height="40" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5" rx="5"/><text x="190" y="157" text-anchor="middle" class="bld2-t bld2-mn">Row 1 (built)</text><rect x="120" y="178" width="140" height="40" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5" rx="5"/><text x="190" y="203" text-anchor="middle" class="bld2-t bld2-mn">Row 2 (built)</text><rect x="120" y="224" width="140" height="40" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5" rx="5"/><text x="190" y="249" text-anchor="middle" class="bld2-t bld2-mn">Row 3 (built)</text><rect x="120" y="270" width="140" height="40" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5" rx="5"/><text x="190" y="295" text-anchor="middle" class="bld2-t bld2-mn">Row 4 (built)</text><text x="190" y="328" text-anchor="middle" class="bld2-t bld2-cap">All rows built up front, even off-screen.</text><rect x="370" y="48" width="320" height="290" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="74" text-anchor="middle" class="bld2-t bld2-good">ListView.builder(itemBuilder)</text><rect x="430" y="86" width="200" height="92" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3" rx="6"/><text x="530" y="110" text-anchor="middle" class="bld2-t bld2-cap">viewport</text><rect x="446" y="118" width="168" height="22" fill="#ede9fe" stroke="#9333ea" stroke-width="1.5" rx="4"/><text x="530" y="134" text-anchor="middle" class="bld2-t bld2-mn">Row 41 (built)</text><rect x="446" y="146" width="168" height="22" fill="#ede9fe" stroke="#9333ea" stroke-width="1.5" rx="4"/><text x="530" y="162" text-anchor="middle" class="bld2-t bld2-mn">Row 42 (built)</text><rect x="446" y="196" width="168" height="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2" rx="4"/><text x="530" y="211" text-anchor="middle" class="bld2-t bld2-grey">Row 43 — not built</text><rect x="446" y="222" width="168" height="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2" rx="4"/><text x="530" y="237" text-anchor="middle" class="bld2-t bld2-grey">Row 44 — not built</text><rect x="446" y="248" width="168" height="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2" rx="4"/><text x="530" y="263" text-anchor="middle" class="bld2-t bld2-grey">... 9,955 more, unbuilt</text><text x="530" y="298" text-anchor="middle" class="bld2-t bld2-cap">itemBuilder runs only as rows scroll in.</text><text x="530" y="316" text-anchor="middle" class="bld2-t bld2-cap">Off-screen rows cost nothing yet.</text></svg>
