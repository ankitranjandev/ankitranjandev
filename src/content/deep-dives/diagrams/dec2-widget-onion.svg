<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="Nested widget boxes: Padding wraps DecoratedBox wraps Text, each outer layer adding one thing — spacing, then background, around the inner text" style="max-width: 100%; height: auto;"><style>.dec2-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.dec2-title{font-size:16px;font-weight:600}.dec2-h{font-size:13px;font-weight:600}.dec2-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#475569}.dec2-add{font-size:11px;font-weight:600;fill:#9333ea}.dec2-cap{font-size:12px;fill:#64748b}.dec2-layer{font-size:11px;fill:#64748b}</style><text x="360" y="30" text-anchor="middle" class="dec2-t dec2-title">Each layer wraps one child and adds one thing</text><rect x="150" y="56" width="420" height="226" fill="#f3e8ff" stroke="#9333ea" stroke-width="2" rx="12"/><text x="172" y="80" class="dec2-t dec2-h">Padding</text><text x="172" y="98" class="dec2-t dec2-add">adds spacing</text><rect x="196" y="112" width="328" height="148" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="10"/><text x="218" y="136" class="dec2-t dec2-h">DecoratedBox</text><text x="218" y="154" class="dec2-t dec2-add" fill="#b45309">adds a background</text><rect x="244" y="170" width="232" height="74" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/><text x="360" y="202" text-anchor="middle" class="dec2-t dec2-h">Text</text><text x="360" y="224" text-anchor="middle" class="dec2-t dec2-mn">the actual content</text><text x="610" y="120" text-anchor="middle" class="dec2-t dec2-layer">outermost</text><line x1="610" y1="128" x2="610" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dec2-a)"/><text x="610" y="200" text-anchor="middle" class="dec2-t dec2-layer">innermost</text><text x="360" y="308" text-anchor="middle" class="dec2-t dec2-cap">Padding(child: DecoratedBox(child: Text(...))) — wraps read outside-in, render inside-out.</text><defs><marker id="dec2-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker></defs></svg>
