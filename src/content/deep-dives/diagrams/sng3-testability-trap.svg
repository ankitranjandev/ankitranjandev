<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="A widget wired to a global singleton cannot be given a fake in tests, while a widget that takes an injected dependency can be handed a fake" style="max-width: 100%; height: auto;"><style>.sng3-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.sng3-title{font-size:16px;font-weight:600}.sng3-bad{font-size:13px;font-weight:600;fill:#dc2626}.sng3-good{font-size:13px;font-weight:600;fill:#10b981}.sng3-h{font-size:13px;font-weight:600}.sng3-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#475569}.sng3-label{font-size:11px;fill:#64748b}</style><text x="360" y="28" text-anchor="middle" class="sng3-t sng3-title">Can the test hand it a fake?</text><rect x="30" y="50" width="320" height="262" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="76" text-anchor="middle" class="sng3-t sng3-bad">Reaches for the global</text><rect x="90" y="92" width="160" height="42" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="6"/><text x="170" y="118" text-anchor="middle" class="sng3-t sng3-h">CartWidget</text><text x="100" y="160" class="sng3-t sng3-mn">Api().checkout()</text><text x="100" y="178" class="sng3-t sng3-label">hard-wired inside build()</text><line x1="170" y1="186" x2="170" y2="216" stroke="#dc2626" stroke-width="2" marker-end="url(#sng3-r)"/><rect x="100" y="220" width="140" height="42" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/><text x="170" y="246" text-anchor="middle" class="sng3-t sng3-mn">real Api (global)</text><rect x="270" y="220" width="68" height="42" fill="#ffffff" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3" rx="6"/><text x="304" y="241" text-anchor="middle" class="sng3-t sng3-mn">FakeApi</text><text x="304" y="256" text-anchor="middle" class="sng3-t sng3-bad">no way in</text><text x="190" y="290" text-anchor="middle" class="sng3-t sng3-bad">Test hits the live network. No seam.</text><rect x="370" y="50" width="320" height="262" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="76" text-anchor="middle" class="sng3-t sng3-good">Takes it as a parameter</text><rect x="430" y="92" width="200" height="42" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="6"/><text x="530" y="112" text-anchor="middle" class="sng3-t sng3-h">CartWidget(this.api)</text><text x="530" y="128" text-anchor="middle" class="sng3-t sng3-label">api passed in</text><line x1="530" y1="134" x2="530" y2="166" stroke="#10b981" stroke-width="2" marker-end="url(#sng3-g)"/><rect x="408" y="170" width="120" height="42" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/><text x="468" y="196" text-anchor="middle" class="sng3-t sng3-mn">real Api</text><rect x="544" y="170" width="120" height="42" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/><text x="604" y="196" text-anchor="middle" class="sng3-t sng3-mn">FakeApi</text><text x="530" y="240" text-anchor="middle" class="sng3-t sng3-label">prod passes real, test passes fake</text><text x="530" y="262" text-anchor="middle" class="sng3-t sng3-mn">CartWidget(FakeApi())</text><text x="530" y="290" text-anchor="middle" class="sng3-t sng3-good">Test swaps in a fake. Fast and offline.</text><defs><marker id="sng3-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/></marker><marker id="sng3-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker></defs></svg>
