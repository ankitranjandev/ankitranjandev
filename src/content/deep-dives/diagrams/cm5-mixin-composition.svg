<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="Mixin composition" style="max-width: 100%; height: auto;">
  <style>
    .cm5-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:var(--svg-text, #1e293b)}
    .cm5-title{font-size:15px;font-weight:600}
    .cm5-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px}
    .cm5-label{font-size:11px;fill:var(--svg-text-muted, #64748b)}
    .cm5-desc{font-size:10px;fill:var(--svg-text-secondary, #475569)}
  </style>

  <text x="360" y="24" text-anchor="middle" class="cm5-t cm5-title">mixin class — can be both extended AND mixed in</text>

  <!-- Mixin class in center -->
  <rect x="260" y="55" width="200" height="55" fill="var(--svg-purple-fill, #e9d5ff)" stroke="var(--svg-purple, #9333ea)" stroke-width="2" rx="8"/>
  <text x="360" y="78" text-anchor="middle" class="cm5-t cm5-mn" fill="var(--svg-purple-dark, #7c3aed)" font-weight="600">mixin class Logging</text>
  <text x="360" y="97" text-anchor="middle" class="cm5-t cm5-desc">void log(String msg) {...}</text>

  <!-- Two usage patterns -->
  <line x1="310" y1="110" x2="160" y2="150" stroke="var(--svg-text-secondary, #475569)" stroke-width="2" marker-end="url(#cm5-arrow)"/>
  <line x1="410" y1="110" x2="560" y2="150" stroke="var(--svg-text-secondary, #475569)" stroke-width="2" marker-end="url(#cm5-arrow)"/>

  <!-- extends pattern -->
  <rect x="40" y="155" width="240" height="100" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="2" rx="8"/>
  <text x="160" y="180" text-anchor="middle" class="cm5-t cm5-label" font-weight="600">Pattern 1: extends</text>
  <text x="160" y="205" text-anchor="middle" class="cm5-t cm5-mn">class FileLogger</text>
  <text x="160" y="225" text-anchor="middle" class="cm5-t cm5-mn" fill="var(--svg-dart-blue, #0175C2)">extends Logging</text>
  <text x="160" y="245" text-anchor="middle" class="cm5-t cm5-desc">Single inheritance, gets all members</text>

  <!-- with pattern -->
  <rect x="440" y="155" width="240" height="100" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="2" rx="8"/>
  <text x="560" y="180" text-anchor="middle" class="cm5-t cm5-label" font-weight="600">Pattern 2: with (mixin)</text>
  <text x="560" y="205" text-anchor="middle" class="cm5-t cm5-mn">class Widget extends Base</text>
  <text x="560" y="225" text-anchor="middle" class="cm5-t cm5-mn" fill="var(--svg-green, #10b981)">with Logging</text>
  <text x="560" y="245" text-anchor="middle" class="cm5-t cm5-desc">Add behaviour without using up extends</text>

  <!-- pure mixin comparison -->
  <rect x="140" y="280" width="200" height="45" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="1" rx="6"/>
  <text x="240" y="300" text-anchor="middle" class="cm5-t cm5-mn" fill="var(--svg-amber-dark, #d97706)">mixin Logging</text>
  <text x="240" y="318" text-anchor="middle" class="cm5-t cm5-desc">Only mixable, cannot extend</text>

  <rect x="380" y="280" width="200" height="45" fill="var(--svg-purple-fill, #e9d5ff)" stroke="var(--svg-purple, #9333ea)" stroke-width="1" rx="6"/>
  <text x="480" y="300" text-anchor="middle" class="cm5-t cm5-mn" fill="var(--svg-purple-dark, #7c3aed)">mixin class Logging</text>
  <text x="480" y="318" text-anchor="middle" class="cm5-t cm5-desc">Both mixable AND extendable</text>

  <defs>
    <marker id="cm5-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--svg-text-secondary, #475569)"/>
    </marker>
  </defs>
</svg>
