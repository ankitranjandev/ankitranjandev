<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 350" role="img" aria-label="An abstract factory switches on the platform to pick a whole family of related widgets: the Material family on Android or the Cupertino family on iOS" style="max-width: 100%; height: auto;"><style>.fac4-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.fac4-title{font-size:16px;font-weight:600}.fac4-h{font-size:13px;font-weight:600}.fac4-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#475569}.fac4-label{font-size:11px;fill:#64748b}.fac4-cap{font-size:12px;fill:#64748b}.fac4-fam{font-size:12px;font-weight:600}</style><text x="360" y="28" text-anchor="middle" class="fac4-t fac4-title">One switch picks a whole family, not one object</text><rect x="270" y="50" width="180" height="48" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="8"/><text x="360" y="71" text-anchor="middle" class="fac4-t fac4-h">platform?</text><text x="360" y="89" text-anchor="middle" class="fac4-t fac4-label">the abstract factory</text><line x1="305" y1="98" x2="200" y2="138" stroke="#9333ea" stroke-width="2" marker-end="url(#fac4-p)"/><line x1="415" y1="98" x2="520" y2="138" stroke="#9333ea" stroke-width="2" marker-end="url(#fac4-p)"/><text x="232" y="124" text-anchor="middle" class="fac4-t fac4-label">Android</text><text x="488" y="124" text-anchor="middle" class="fac4-t fac4-label">iOS</text><rect x="40" y="140" width="290" height="170" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" rx="10"/><text x="185" y="164" text-anchor="middle" class="fac4-t fac4-fam" fill="#10b981">Material family</text><rect x="58" y="178" width="120" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="118" y="203" text-anchor="middle" class="fac4-t fac4-mn">MaterialApp</text><rect x="192" y="178" width="120" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="252" y="203" text-anchor="middle" class="fac4-t fac4-mn">AppBar</text><rect x="58" y="228" width="120" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="118" y="253" text-anchor="middle" class="fac4-t fac4-mn">Switch</text><rect x="192" y="228" width="120" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="252" y="253" text-anchor="middle" class="fac4-t fac4-mn">ElevatedButton</text><text x="185" y="292" text-anchor="middle" class="fac4-t fac4-label">parts designed to go together</text><rect x="390" y="140" width="290" height="170" fill="#eff6ff" stroke="#0369a1" stroke-width="1.5" rx="10"/><text x="535" y="164" text-anchor="middle" class="fac4-t fac4-fam" fill="#0369a1">Cupertino family</text><rect x="408" y="178" width="120" height="40" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5" rx="6"/><text x="468" y="203" text-anchor="middle" class="fac4-t fac4-mn">CupertinoApp</text><rect x="542" y="178" width="120" height="40" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5" rx="6"/><text x="602" y="203" text-anchor="middle" class="fac4-t fac4-mn">NavigationBar</text><rect x="408" y="228" width="120" height="40" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5" rx="6"/><text x="468" y="253" text-anchor="middle" class="fac4-t fac4-mn">CupertinoSwitch</text><rect x="542" y="228" width="120" height="40" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5" rx="6"/><text x="602" y="253" text-anchor="middle" class="fac4-t fac4-mn">FilledButton</text><text x="535" y="292" text-anchor="middle" class="fac4-t fac4-label">a matching set for the platform</text><text x="360" y="334" text-anchor="middle" class="fac4-t fac4-cap">Pick the factory once. Every widget it makes belongs to the same family.</text><defs><marker id="fac4-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker></defs></svg>