<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-label="Smi vs Mint boxing cost comparison">
  <defs>
    <marker id="arrowhead-2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--svg-text, #1e293b)"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .title { font-size: 17px; font-weight: 600; }
    .subtitle { font-size: 14px; font-weight: 500; fill: var(--svg-text-secondary, #475569); }
    .label { font-size: 12px; fill: var(--svg-text-muted, #64748b); }
    .small-label { font-size: 10px; fill: var(--svg-text-muted, #64748b); }
    .mono { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 13px; }
    .var-name { font-size: 18px; font-weight: 700; font-family: "SF Mono", Menlo, Monaco, monospace; }
    .tag-text { font-size: 11px; font-weight: 700; fill: #ffffff; font-family: "SF Mono", Menlo, monospace; }
    .cost { font-size: 12px; fill: var(--svg-amber, #b45309); }
    .free { font-size: 12px; fill: var(--svg-green-dark, #059669); }
    .mint-caption { font-size: 12px; fill: var(--svg-amber, #92400e); font-style: italic; }
    .green-box { fill: var(--svg-green-fill, #d1fae5); stroke: var(--svg-green, #10b981); }
    .amber-box { fill: var(--svg-amber-fill, #fef3c7); stroke: var(--svg-amber, #f59e0b); }
    .green-tag { fill: var(--svg-green, #10b981); }
    .amber-tag { fill: var(--svg-amber, #f59e0b); }
    .divider { stroke: var(--svg-border, #e2e8f0); }
    .arrow { stroke: var(--svg-text, #1e293b); }
    .amber-line { stroke: var(--svg-amber, #f59e0b); }
  </style>

  <!-- Header -->
  <text x="360" y="32" text-anchor="middle" class="title">What boxing costs</text>

  <!-- ============ LEFT: Smi case ============ -->
  <text x="180" y="78" text-anchor="middle" class="subtitle">x = 42 (fits as Smi)</text>

  <!-- Variable label & arrow -->
  <text x="40" y="148" class="var-name">x</text>
  <line x1="60" y1="143" x2="92" y2="143" class="arrow" stroke-width="1.5" marker-end="url(#arrowhead-2)"/>

  <!-- Slot with value inline -->
  <rect x="98" y="120" width="170" height="50" class="green-box" stroke-width="2" rx="4"/>
  <text x="183" y="148" text-anchor="middle" class="mono">value: 42</text>

  <!-- Tag -->
  <rect x="268" y="120" width="35" height="50" class="green-tag" rx="4"/>
  <text x="285" y="153" text-anchor="middle" class="tag-text">0</text>

  <!-- Cost annotations -->
  <text x="180" y="220" text-anchor="middle" class="free">✓  0 extra bytes</text>
  <text x="180" y="240" text-anchor="middle" class="free">✓  no allocation</text>
  <text x="180" y="260" text-anchor="middle" class="free">✓  invisible to GC</text>

  <!-- Vertical separator -->
  <line x1="360" y1="65" x2="360" y2="320" class="divider" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ============ RIGHT: Mint case ============ -->
  <text x="540" y="78" text-anchor="middle" class="subtitle">x = 1 &lt;&lt; 62 (boxed as Mint)</text>

  <!-- Variable label & arrow -->
  <text x="395" y="148" class="var-name">x</text>
  <line x1="415" y1="143" x2="447" y2="143" class="arrow" stroke-width="1.5" marker-end="url(#arrowhead-2)"/>

  <!-- Slot with pointer -->
  <rect x="452" y="120" width="135" height="50" class="amber-box" stroke-width="2" rx="4"/>
  <text x="519" y="142" text-anchor="middle" class="label">pointer</text>
  <text x="519" y="162" text-anchor="middle" class="mono" font-size="11">0xA1B2…</text>

  <rect x="587" y="120" width="35" height="50" class="amber-tag" rx="4"/>
  <text x="604" y="153" text-anchor="middle" class="tag-text">1</text>

  <!-- Arrow from slot down to heap object -->
  <line x1="519" y1="175" x2="519" y2="210" class="arrow" stroke-width="2" marker-end="url(#arrowhead-2)"/>

  <!-- Heap Mint object -->
  <rect x="430" y="215" width="180" height="55" class="amber-box" stroke-width="2" rx="4"/>
  <line x1="498" y1="215" x2="498" y2="270" class="amber-line" stroke-width="1.5"/>
  <text x="464" y="237" text-anchor="middle" class="label">header</text>
  <text x="464" y="258" text-anchor="middle" class="small-label">+ GC tags</text>
  <text x="554" y="237" text-anchor="middle" class="label">value</text>
  <text x="554" y="260" text-anchor="middle" class="mono">8 bytes</text>
  <text x="520" y="292" text-anchor="middle" class="mint-caption">Mint heap object</text>

  <!-- Cost annotations -->
  <text x="540" y="335" text-anchor="middle" class="cost">✗  extra allocation</text>
  <text x="540" y="355" text-anchor="middle" class="cost">✗  pointer indirection on every read</text>
  <text x="540" y="375" text-anchor="middle" class="cost">✗  GC has to track it</text>
</svg>
