<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 372" role="img" aria-label="The same observer pattern appears three times in Dart and Flutter: ChangeNotifier, ValueNotifier, and Stream, mapped across register, notify, data, and typical use" style="max-width: 100%; height: auto;"><style>.ob3-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.ob3-title{font-size:16px;font-weight:600}.ob3-hd{font-size:13px;font-weight:700;fill:#ffffff}.ob3-role{font-size:12px;font-weight:600;fill:#475569}.ob3-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#1e293b}.ob3-sub{font-size:11px;fill:#64748b}</style><text x="360" y="28" text-anchor="middle" class="ob3-t ob3-title">The same pattern, three times over</text><rect x="20" y="48" width="150" height="44" fill="#1e293b" rx="6"/><text x="95" y="76" text-anchor="middle" class="ob3-t ob3-hd">Role</text><rect x="174" y="48" width="172" height="44" fill="#9333ea" rx="6"/><text x="260" y="76" text-anchor="middle" class="ob3-t ob3-hd">ChangeNotifier</text><rect x="350" y="48" width="172" height="44" fill="#10b981" rx="6"/><text x="436" y="76" text-anchor="middle" class="ob3-t ob3-hd">ValueNotifier</text><rect x="526" y="48" width="172" height="44" fill="#f59e0b" rx="6"/><text x="612" y="76" text-anchor="middle" class="ob3-t ob3-hd">Stream</text><rect x="20" y="98" width="678" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="4"/><text x="95" y="132" text-anchor="middle" class="ob3-t ob3-role">Register</text><text x="260" y="132" text-anchor="middle" class="ob3-t ob3-mn">addListener(fn)</text><text x="436" y="132" text-anchor="middle" class="ob3-t ob3-mn">addListener(fn)</text><text x="612" y="132" text-anchor="middle" class="ob3-t ob3-mn">stream.listen(fn)</text><rect x="20" y="160" width="678" height="58" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="4"/><text x="95" y="194" text-anchor="middle" class="ob3-t ob3-role">Notify</text><text x="260" y="194" text-anchor="middle" class="ob3-t ob3-mn">notifyListeners()</text><text x="436" y="194" text-anchor="middle" class="ob3-t ob3-mn">.value = next</text><text x="612" y="194" text-anchor="middle" class="ob3-t ob3-mn">sink.add(next)</text><rect x="20" y="222" width="678" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="4"/><text x="95" y="256" text-anchor="middle" class="ob3-t ob3-role">Carries data?</text><text x="260" y="250" text-anchor="middle" class="ob3-t ob3-sub">No — read fields</text><text x="260" y="266" text-anchor="middle" class="ob3-t ob3-sub">off the object</text><text x="436" y="256" text-anchor="middle" class="ob3-t ob3-sub">Yes — one value</text><text x="436" y="272" text-anchor="middle" class="ob3-t ob3-mn">.value</text><text x="612" y="256" text-anchor="middle" class="ob3-t ob3-sub">Yes — a sequence</text><text x="612" y="272" text-anchor="middle" class="ob3-t ob3-sub">of events over time</text><rect x="20" y="284" width="678" height="58" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="4"/><text x="95" y="318" text-anchor="middle" class="ob3-t ob3-role">Typical use</text><text x="260" y="318" text-anchor="middle" class="ob3-t ob3-sub">a whole model</text><text x="436" y="318" text-anchor="middle" class="ob3-t ob3-sub">one piece of state</text><text x="612" y="318" text-anchor="middle" class="ob3-t ob3-sub">async data feeds</text><text x="360" y="360" text-anchor="middle" class="ob3-t ob3-sub">Learn it once and you have read all three.</text></svg>