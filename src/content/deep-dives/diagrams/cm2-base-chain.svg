<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="Base class inheritance chain" style="max-width: 100%; height: auto;">
  <style>
    .cm2-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:var(--svg-text, #1e293b)}
    .cm2-title{font-size:15px;font-weight:600}
    .cm2-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px}
    .cm2-label{font-size:10px;fill:var(--svg-text-muted, #64748b)}
    .cm2-note{font-size:10px;fill:var(--svg-text-secondary, #475569)}
  </style>

  <text x="360" y="24" text-anchor="middle" class="cm2-t cm2-title">base forces the entire inheritance chain to stay in your library</text>

  <!-- Your library box -->
  <rect x="40" y="45" width="300" height="200" fill="var(--svg-green-fill, #f0fdf4)" stroke="var(--svg-green, #10b981)" stroke-width="2" rx="8" stroke-dasharray="6,3"/>
  <text x="190" y="70" text-anchor="middle" class="cm2-t cm2-label" font-weight="600">your_library.dart</text>

  <!-- Base class -->
  <rect x="70" y="90" width="120" height="45" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="2" rx="6"/>
  <text x="130" y="118" text-anchor="middle" class="cm2-t cm2-mn">base class A</text>

  <!-- Subclass -->
  <rect x="200" y="90" width="120" height="45" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="2" rx="6"/>
  <text x="260" y="112" text-anchor="middle" class="cm2-t cm2-mn">base class B</text>
  <text x="260" y="126" text-anchor="middle" class="cm2-t cm2-mn" font-size="10">extends A</text>

  <line x1="190" y1="112" x2="200" y2="112" stroke="var(--svg-text-secondary, #475569)" stroke-width="2" marker-end="url(#cm2-arrow)"/>

  <!-- External library -->
  <rect x="380" y="45" width="300" height="200" fill="var(--svg-red-fill-light, #fef2f2)" stroke="var(--svg-red, #dc2626)" stroke-width="2" rx="8" stroke-dasharray="6,3"/>
  <text x="530" y="70" text-anchor="middle" class="cm2-t cm2-label" font-weight="600">external_package.dart</text>

  <!-- Cannot extend -->
  <rect x="420" y="90" width="120" height="45" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" stroke-width="1" rx="6" opacity="0.6"/>
  <text x="480" y="112" text-anchor="middle" class="cm2-t cm2-mn" fill="var(--svg-red, #dc2626)">class C</text>
  <text x="480" y="126" text-anchor="middle" class="cm2-t cm2-mn" fill="var(--svg-red, #dc2626)" font-size="10">extends B</text>
  <line x1="400" y1="85" x2="560" y2="140" stroke="var(--svg-red, #dc2626)" stroke-width="2"/>
  <line x1="400" y1="140" x2="560" y2="85" stroke="var(--svg-red, #dc2626)" stroke-width="2"/>

  <!-- Cannot implement -->
  <rect x="550" y="90" width="120" height="45" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" stroke-width="1" rx="6" opacity="0.6"/>
  <text x="610" y="112" text-anchor="middle" class="cm2-t cm2-mn" fill="var(--svg-red, #dc2626)">class D</text>
  <text x="610" y="126" text-anchor="middle" class="cm2-t cm2-mn" fill="var(--svg-red, #dc2626)" font-size="10">implements A</text>
  <line x1="530" y1="85" x2="690" y2="140" stroke="var(--svg-red, #dc2626)" stroke-width="2"/>
  <line x1="530" y1="140" x2="690" y2="85" stroke="var(--svg-red, #dc2626)" stroke-width="2"/>

  <!-- Can use -->
  <rect x="420" y="165" width="220" height="55" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="2" rx="6"/>
  <text x="530" y="187" text-anchor="middle" class="cm2-t cm2-mn" fill="var(--svg-green-dark, #059669)">var obj = B();</text>
  <text x="530" y="205" text-anchor="middle" class="cm2-t cm2-note">Can instantiate and use objects</text>

  <text x="360" y="275" text-anchor="middle" class="cm2-t cm2-note">Subclasses of base must also be base, final, or sealed — the chain is unbroken</text>

  <defs>
    <marker id="cm2-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--svg-text-secondary, #475569)"/>
    </marker>
  </defs>
</svg>
