<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" style="max-width: 100%; height: auto;" role="img" aria-label="Impeller vs Skia: precompiled shaders eliminate first-run jank">
  <style>
    .fp2is-title { font: bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .fp2is-label { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .fp2is-small { font: 10px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text-muted, #64748b); }
    .fp2is-code { font: 600 10px "SF Mono", Menlo, Monaco, monospace; fill: var(--svg-text, #1e293b); }
  </style>

  <text x="360" y="28" text-anchor="middle" class="fp2is-title">Why Impeller Eliminates Shader Jank</text>

  <!-- Skia Timeline -->
  <g transform="translate(30, 55)">
    <rect x="0" y="0" width="660" height="95" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" stroke-width="2" rx="8"/>
    <text x="50" y="22" text-anchor="start" class="fp2is-label" fill="var(--svg-red, #dc2626)">Skia (JIT Shader Compilation)</text>

    <!-- Timeline bar -->
    <rect x="20" y="35" width="620" height="35" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>

    <!-- Frame 1 with compile stall -->
    <rect x="20" y="35" width="80" height="35" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="1" rx="4"/>

    <!-- Spike for shader compile -->
    <rect x="100" y="20" width="40" height="50" fill="var(--svg-red, #dc2626)" rx="3"/>
    <text x="120" y="43" text-anchor="middle" class="fp2is-code" fill="white">JANK</text>

    <!-- Remaining frames smooth -->
    <rect x="140" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="220" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="300" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="380" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="460" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="540" y="35" width="100" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1" rx="4"/>

    <!-- Labels -->
    <text x="60" y="57" text-anchor="middle" class="fp2is-small">Frame 1</text>
    <text x="180" y="57" text-anchor="middle" class="fp2is-small">Frame 2</text>
    <text x="580" y="57" text-anchor="middle" class="fp2is-small">Smooth after</text>

    <text x="330" y="85" text-anchor="middle" class="fp2is-small">First time a blur/gradient/effect appears → GPU compiles shader → stall → dropped frames</text>
  </g>

  <!-- Impeller Timeline -->
  <g transform="translate(30, 165)">
    <rect x="0" y="0" width="660" height="95" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="2" rx="8"/>
    <text x="50" y="22" text-anchor="start" class="fp2is-label" fill="var(--svg-green, #10b981)">Impeller (AOT Shader Compilation)</text>

    <!-- Timeline bar -->
    <rect x="20" y="35" width="620" height="35" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>

    <!-- All frames smooth -->
    <rect x="20" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1" rx="4"/>
    <rect x="100" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="180" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="260" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="340" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="420" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="500" y="35" width="60" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <rect x="560" y="35" width="80" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1" rx="4"/>

    <!-- Labels -->
    <text x="60" y="57" text-anchor="middle" class="fp2is-small">Frame 1</text>
    <text x="140" y="57" text-anchor="middle" class="fp2is-small">Frame 2</text>
    <text x="600" y="57" text-anchor="middle" class="fp2is-small">All smooth</text>

    <text x="330" y="85" text-anchor="middle" class="fp2is-small">Shaders precompiled at flutter build time → no runtime compilation → no jank</text>
  </g>

  <!-- Key insight -->
  <g transform="translate(30, 270)">
    <rect x="0" y="0" width="660" height="25" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="4"/>
    <text x="330" y="16" text-anchor="middle" class="fp2is-small">Impeller: Metal on iOS (mandatory), Vulkan on Android API 29+ (default). Web still uses Skia (canvaskit/skwasm).</text>
  </g>
</svg>
