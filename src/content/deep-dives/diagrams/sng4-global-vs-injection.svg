<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 350" role="img" aria-label="On the left every widget reaches sideways into a global singleton; on the right dependencies flow down the widget tree from a provider at the top" style="max-width: 100%; height: auto;"><style>.sng4-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.sng4-title{font-size:16px;font-weight:600}.sng4-bad{font-size:13px;font-weight:600;fill:#dc2626}.sng4-good{font-size:13px;font-weight:600;fill:#10b981}.sng4-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#1e293b}.sng4-label{font-size:11px;fill:#64748b}</style><text x="360" y="28" text-anchor="middle" class="sng4-t sng4-title">Reach sideways into a global, or pass it down the tree</text><rect x="30" y="48" width="320" height="270" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="74" text-anchor="middle" class="sng4-t sng4-bad">Global access</text><rect x="146" y="206" width="88" height="34" fill="#fde68a" stroke="#f59e0b" stroke-width="2" rx="6"/><text x="190" y="228" text-anchor="middle" class="sng4-t sng4-mn">Api()</text><rect x="50" y="98" width="84" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="92" y="119" text-anchor="middle" class="sng4-t sng4-mn">Cart</text><rect x="248" y="98" width="84" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="290" y="119" text-anchor="middle" class="sng4-t sng4-mn">Profile</text><rect x="50" y="150" width="84" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="92" y="171" text-anchor="middle" class="sng4-t sng4-mn">Feed</text><rect x="248" y="150" width="84" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="290" y="171" text-anchor="middle" class="sng4-t sng4-mn">Settings</text><line x1="92" y1="130" x2="170" y2="206" stroke="#dc2626" stroke-width="1.3" marker-end="url(#sng4-r)"/><line x1="290" y1="130" x2="210" y2="206" stroke="#dc2626" stroke-width="1.3" marker-end="url(#sng4-r)"/><line x1="92" y1="182" x2="168" y2="208" stroke="#dc2626" stroke-width="1.3" marker-end="url(#sng4-r)"/><line x1="290" y1="182" x2="212" y2="208" stroke="#dc2626" stroke-width="1.3" marker-end="url(#sng4-r)"/><text x="190" y="270" text-anchor="middle" class="sng4-t sng4-label">Every widget knows the global by name.</text><text x="190" y="290" text-anchor="middle" class="sng4-t sng4-label">Hidden dependencies, hard to redirect.</text><text x="190" y="308" text-anchor="middle" class="sng4-t sng4-bad">Coupled to one concrete Api</text><rect x="370" y="48" width="320" height="270" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="74" text-anchor="middle" class="sng4-t sng4-good">Dependency injection</text><rect x="466" y="92" width="128" height="34" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/><text x="530" y="114" text-anchor="middle" class="sng4-t sng4-mn">Provider(api)</text><rect x="412" y="160" width="84" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="454" y="181" text-anchor="middle" class="sng4-t sng4-mn">Cart</text><rect x="564" y="160" width="84" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="606" y="181" text-anchor="middle" class="sng4-t sng4-mn">Profile</text><rect x="412" y="220" width="84" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="454" y="241" text-anchor="middle" class="sng4-t sng4-mn">Feed</text><rect x="564" y="220" width="84" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="606" y="241" text-anchor="middle" class="sng4-t sng4-mn">Settings</text><line x1="530" y1="126" x2="454" y2="160" stroke="#10b981" stroke-width="1.3" marker-end="url(#sng4-g)"/><line x1="530" y1="126" x2="606" y2="160" stroke="#10b981" stroke-width="1.3" marker-end="url(#sng4-g)"/><line x1="454" y1="192" x2="454" y2="220" stroke="#10b981" stroke-width="1.3" marker-end="url(#sng4-g)"/><line x1="606" y1="192" x2="606" y2="220" stroke="#10b981" stroke-width="1.3" marker-end="url(#sng4-g)"/><text x="530" y="278" text-anchor="middle" class="sng4-t sng4-label">One source at the top, flowing down.</text><text x="530" y="298" text-anchor="middle" class="sng4-t sng4-label">Swap the provider, swap it everywhere.</text><text x="530" y="316" text-anchor="middle" class="sng4-t sng4-good">Each widget takes what it needs</text><defs><marker id="sng4-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/></marker><marker id="sng4-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker></defs></svg>
