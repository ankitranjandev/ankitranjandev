<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" role="img" aria-label="Polling versus observing: polling repeatedly asks whether the value changed and wastes work, while observing pushes an update only when the value actually changes" style="max-width: 100%; height: auto;"><style>.ob2-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.ob2-title{font-size:16px;font-weight:600}.ob2-h{font-size:14px;font-weight:600}.ob2-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#475569}.ob2-label{font-size:12px;fill:#64748b}.ob2-bad{font-size:13px;font-weight:600;fill:#dc2626}.ob2-good{font-size:13px;font-weight:600;fill:#10b981}</style><text x="360" y="30" text-anchor="middle" class="ob2-t ob2-title">Pulling wastes work. Pushing tells you exactly once.</text><rect x="30" y="56" width="320" height="244" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="82" text-anchor="middle" class="ob2-t ob2-bad">Polling — keep asking</text><rect x="58" y="100" width="100" height="40" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="6"/><text x="108" y="125" text-anchor="middle" class="ob2-t ob2-h">Observer</text><rect x="222" y="100" width="100" height="40" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="6"/><text x="272" y="125" text-anchor="middle" class="ob2-t ob2-h">Subject</text><line x1="158" y1="113" x2="222" y2="113" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ob2-r)"/><text x="190" y="108" text-anchor="middle" class="ob2-t ob2-mn">changed?</text><line x1="222" y1="130" x2="158" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ob2-g)"/><text x="190" y="153" text-anchor="middle" class="ob2-t ob2-mn">no</text><line x1="158" y1="170" x2="222" y2="170" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ob2-r)"/><text x="190" y="165" text-anchor="middle" class="ob2-t ob2-mn">changed?</text><line x1="222" y1="187" x2="158" y2="187" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ob2-g)"/><text x="190" y="210" text-anchor="middle" class="ob2-t ob2-mn">no</text><line x1="158" y1="227" x2="222" y2="227" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ob2-r)"/><text x="190" y="222" text-anchor="middle" class="ob2-t ob2-mn">changed?</text><line x1="222" y1="244" x2="158" y2="244" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ob2-g)"/><text x="190" y="267" text-anchor="middle" class="ob2-t ob2-mn">still no...</text><text x="190" y="290" text-anchor="middle" class="ob2-t ob2-label">Most checks are wasted.</text><rect x="370" y="56" width="320" height="244" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="82" text-anchor="middle" class="ob2-t ob2-good">Observing — get told</text><rect x="398" y="120" width="100" height="40" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="6"/><text x="448" y="145" text-anchor="middle" class="ob2-t ob2-h">Observer</text><rect x="562" y="120" width="100" height="40" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="6"/><text x="612" y="145" text-anchor="middle" class="ob2-t ob2-h">Subject</text><line x1="498" y1="134" x2="562" y2="134" stroke="#10b981" stroke-width="1.5" marker-end="url(#ob2-g)"/><text x="530" y="129" text-anchor="middle" class="ob2-t ob2-mn">register</text><line x1="562" y1="186" x2="498" y2="186" stroke="#10b981" stroke-width="2.5" marker-end="url(#ob2-g)"/><text x="530" y="206" text-anchor="middle" class="ob2-t ob2-mn">notify() &#8212; value changed!</text><text x="530" y="248" text-anchor="middle" class="ob2-t ob2-label">Silence until something</text><text x="530" y="266" text-anchor="middle" class="ob2-t ob2-label">actually happens.</text><defs><marker id="ob2-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/></marker><marker id="ob2-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker></defs></svg>