<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" style="max-width: 100%; height: auto;" role="img" aria-label="VSync signal flow from CRT monitor through Flutter engine to Dart framework">
  <defs>
    <marker id="fp1-v-arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--svg-dart-blue, #0175C2)"/>
    </marker>
    <marker id="fp1-v-arrow-green" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--svg-green, #10b981)"/>
    </marker>
  </defs>
  <style>
    .fp1-title { font: bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .fp1-label { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text-secondary, #475569); }
    .fp1-small { font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text-muted, #64748b); }
    .fp1-code { font: 600 10px "SF Mono", Menlo, Monaco, monospace; fill: var(--svg-text, #1e293b); }
    .fp1-box { fill: var(--svg-bg, #f8fafc); stroke: var(--svg-border, #cbd5e1); stroke-width: 1.5; }
    .fp1-blue-box { fill: var(--svg-dart-blue-fill, #dbeafe); stroke: var(--svg-dart-blue, #0175C2); stroke-width: 2; }
    .fp1-green-box { fill: var(--svg-green-fill, #d1fae5); stroke: var(--svg-green, #10b981); stroke-width: 2; }
    .fp1-amber-box { fill: var(--svg-amber-fill, #fef3c7); stroke: var(--svg-amber, #f59e0b); stroke-width: 2; }
  </style>

  <text x="360" y="28" text-anchor="middle" class="fp1-title">VSync: From Hardware Pulse to Dart Callback</text>

  <!-- CRT Monitor Section -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="160" height="180" class="fp1-box" rx="8"/>
    <text x="80" y="24" text-anchor="middle" class="fp1-label">Display Hardware</text>

    <!-- Monitor representation -->
    <rect x="30" y="40" width="100" height="75" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-text-subtle, #94a3b8)" stroke-width="1.5" rx="4"/>

    <!-- Scan lines -->
    <line x1="35" y1="50" x2="125" y2="50" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" opacity="0.3"/>
    <line x1="35" y1="60" x2="125" y2="60" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" opacity="0.4"/>
    <line x1="35" y1="70" x2="125" y2="70" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" opacity="0.5"/>
    <line x1="35" y1="80" x2="100" y2="80" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="2"/>
    <circle cx="100" cy="80" r="3" fill="var(--svg-dart-blue, #0175C2)"/>

    <text x="80" y="105" text-anchor="middle" class="fp1-small">Beam scans top→bottom</text>

    <!-- VBI indicator -->
    <rect x="15" y="125" width="130" height="45" class="fp1-green-box" rx="4"/>
    <text x="80" y="145" text-anchor="middle" class="fp1-code">VBI Period</text>
    <text x="80" y="160" text-anchor="middle" class="fp1-small">Beam resets to top-left</text>
  </g>

  <!-- Pulse -->
  <g transform="translate(200, 110)">
    <line x1="0" y1="30" x2="50" y2="30" stroke="var(--svg-green, #10b981)" stroke-width="2" marker-end="url(#fp1-v-arrow-green)"/>
    <text x="25" y="20" text-anchor="middle" class="fp1-code" fill="var(--svg-green, #10b981)">VSync</text>
    <text x="25" y="50" text-anchor="middle" class="fp1-small">pulse</text>
  </g>

  <!-- Platform Layer -->
  <g transform="translate(260, 50)">
    <rect x="0" y="0" width="150" height="180" class="fp1-amber-box" rx="8"/>
    <text x="75" y="24" text-anchor="middle" class="fp1-label">Platform Layer</text>

    <rect x="15" y="40" width="120" height="35" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>
    <text x="75" y="55" text-anchor="middle" class="fp1-code">CADisplayLink</text>
    <text x="75" y="68" text-anchor="middle" class="fp1-small">(iOS)</text>

    <rect x="15" y="85" width="120" height="35" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>
    <text x="75" y="100" text-anchor="middle" class="fp1-code">Choreographer</text>
    <text x="75" y="113" text-anchor="middle" class="fp1-small">(Android)</text>

    <line x1="75" y1="130" x2="75" y2="150" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="2" marker-end="url(#fp1-v-arrow)"/>

    <text x="75" y="168" text-anchor="middle" class="fp1-code">Engine.OnVSync()</text>
  </g>

  <!-- Arrow to Dart -->
  <g transform="translate(420, 130)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="2" marker-end="url(#fp1-v-arrow)"/>
  </g>

  <!-- Dart Framework -->
  <g transform="translate(470, 50)">
    <rect x="0" y="0" width="220" height="180" class="fp1-blue-box" rx="8"/>
    <text x="110" y="24" text-anchor="middle" class="fp1-label">Dart Framework (UI Thread)</text>

    <rect x="10" y="40" width="200" height="28" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>
    <text x="110" y="58" text-anchor="middle" class="fp1-code">SchedulerBinding.handleBeginFrame()</text>

    <line x1="110" y1="68" x2="110" y2="78" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5"/>

    <rect x="10" y="80" width="200" height="22" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>
    <text x="110" y="95" text-anchor="middle" class="fp1-code">Transient callbacks (Tickers)</text>

    <line x1="110" y1="102" x2="110" y2="112" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5"/>

    <rect x="10" y="114" width="200" height="22" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>
    <text x="110" y="129" text-anchor="middle" class="fp1-code">handleDrawFrame()</text>

    <line x1="110" y1="136" x2="110" y2="146" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5"/>

    <rect x="10" y="148" width="200" height="22" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>
    <text x="110" y="163" text-anchor="middle" class="fp1-code">build → layout → paint → render</text>
  </g>

  <!-- Frame Budget Timeline -->
  <g transform="translate(30, 260)">
    <text x="330" y="0" text-anchor="middle" class="fp1-label">The 16.6ms Frame Budget (60Hz)</text>

    <rect x="0" y="15" width="660" height="50" class="fp1-box" rx="6"/>

    <!-- Timeline bar -->
    <rect x="20" y="30" width="620" height="20" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>

    <!-- Segments -->
    <rect x="20" y="30" width="200" height="20" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1" rx="4"/>
    <text x="120" y="44" text-anchor="middle" class="fp1-code">UI Thread Work</text>

    <rect x="220" y="30" width="200" height="20" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1"/>
    <text x="320" y="44" text-anchor="middle" class="fp1-code">Raster Thread Work</text>

    <rect x="420" y="30" width="100" height="20" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
    <text x="470" y="44" text-anchor="middle" class="fp1-code">Idle</text>

    <rect x="520" y="30" width="120" height="20" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="1" rx="4"/>
    <text x="580" y="44" text-anchor="middle" class="fp1-code">Next VSync</text>

    <!-- Time markers -->
    <text x="20" y="75" text-anchor="start" class="fp1-small">0ms</text>
    <text x="640" y="75" text-anchor="end" class="fp1-small">16.6ms</text>
  </g>

  <!-- Key insight -->
  <g transform="translate(30, 340)">
    <rect x="0" y="0" width="660" height="45" fill="var(--svg-purple-fill, #f3e8ff)" stroke="var(--svg-purple, #9333ea)" stroke-width="2" rx="6"/>
    <text x="330" y="18" text-anchor="middle" class="fp1-label" fill="var(--svg-purple, #9333ea)">Key Insight</text>
    <text x="330" y="35" text-anchor="middle" class="fp1-small">Both UI and Raster work must complete within 16.6ms. Miss the budget → dropped frame → visible jank.</text>
  </g>
</svg>
