<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="The 53-bit integer precision cliff for doubles">
  <style>
    .e2-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .e2-title { font-size: 16px; font-weight: 600; }
    .e2-sub { font-size: 13px; fill: #64748b; }
    .e2-mn { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 13px; font-weight: 600; }
    .e2-mn-small { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 11px; }
    .e2-label { font-size: 12px; fill: #475569; }
    .e2-good { font-size: 12px; font-weight: 600; fill: #059669; }
    .e2-bad { font-size: 12px; font-weight: 600; fill: #dc2626; }
    .e2-note { font-size: 12px; fill: #475569; font-style: italic; }
    .e2-cliff { font-size: 13px; font-weight: 700; fill: #dc2626; }
  </style>

  <text x="360" y="28" text-anchor="middle" class="e2-t e2-title">The 53-bit precision cliff</text>
  <text x="360" y="48" text-anchor="middle" class="e2-t e2-sub">Doubles can exactly represent every integer up to 2⁵³. Past that, they start skipping.</text>

  <!-- Number line -->
  <line x1="40" y1="160" x2="680" y2="160" stroke="#94a3b8" stroke-width="2"/>

  <!-- Left region: continuous -->
  <rect x="40" y="155" width="290" height="10" fill="#d1fae5"/>

  <!-- Right region: gappy -->
  <g>
    <rect x="340" y="155" width="20" height="10" fill="#fee2e2"/>
    <rect x="380" y="155" width="20" height="10" fill="#fee2e2"/>
    <rect x="420" y="155" width="20" height="10" fill="#fee2e2"/>
    <rect x="460" y="155" width="20" height="10" fill="#fee2e2"/>
    <rect x="500" y="155" width="20" height="10" fill="#fee2e2"/>
    <rect x="540" y="155" width="20" height="10" fill="#fee2e2"/>
    <rect x="580" y="155" width="20" height="10" fill="#fee2e2"/>
    <rect x="620" y="155" width="20" height="10" fill="#fee2e2"/>
  </g>

  <!-- Cliff marker -->
  <line x1="335" y1="120" x2="335" y2="195" stroke="#dc2626" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="335" y="112" text-anchor="middle" class="e2-t e2-cliff">cliff at 2⁵³</text>

  <!-- Tick marks for representable values on left -->
  <g>
    <line x1="100" y1="155" x2="100" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="160" y1="155" x2="160" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="220" y1="155" x2="220" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="280" y1="155" x2="280" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="330" y1="155" x2="330" y2="175" stroke="#10b981" stroke-width="2"/>
  </g>

  <!-- Tick marks for representable values on right (sparser) -->
  <g>
    <line x1="350" y1="155" x2="350" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="390" y1="155" x2="390" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="430" y1="155" x2="430" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="470" y1="155" x2="470" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="510" y1="155" x2="510" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="550" y1="155" x2="550" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="590" y1="155" x2="590" y2="175" stroke="#10b981" stroke-width="2"/>
    <line x1="630" y1="155" x2="630" y2="175" stroke="#10b981" stroke-width="2"/>
  </g>

  <!-- Missing values (the "skipped" integers) -->
  <g>
    <line x1="370" y1="155" x2="370" y2="175" stroke="#dc2626" stroke-width="2" stroke-dasharray="2 2"/>
    <line x1="410" y1="155" x2="410" y2="175" stroke="#dc2626" stroke-width="2" stroke-dasharray="2 2"/>
    <line x1="450" y1="155" x2="450" y2="175" stroke="#dc2626" stroke-width="2" stroke-dasharray="2 2"/>
    <line x1="490" y1="155" x2="490" y2="175" stroke="#dc2626" stroke-width="2" stroke-dasharray="2 2"/>
    <line x1="530" y1="155" x2="530" y2="175" stroke="#dc2626" stroke-width="2" stroke-dasharray="2 2"/>
    <line x1="570" y1="155" x2="570" y2="175" stroke="#dc2626" stroke-width="2" stroke-dasharray="2 2"/>
    <line x1="610" y1="155" x2="610" y2="175" stroke="#dc2626" stroke-width="2" stroke-dasharray="2 2"/>
  </g>

  <!-- Labels below -->
  <text x="185" y="220" text-anchor="middle" class="e2-t e2-good">every integer fits exactly</text>
  <text x="490" y="220" text-anchor="middle" class="e2-t e2-bad">only every other integer fits</text>

  <text x="185" y="240" text-anchor="middle" class="e2-t e2-mn-small">0 … 9 007 199 254 740 992</text>
  <text x="490" y="240" text-anchor="middle" class="e2-t e2-mn-small">9 007 199 254 740 992 +</text>

  <!-- Practical example -->
  <text x="40" y="285" class="e2-t e2-label"><tspan class="e2-mn">int big = 9007199254740993;</tspan>     // valid int (2⁵³ + 1)</text>
  <text x="40" y="305" class="e2-t e2-label"><tspan class="e2-mn">double d = big.toDouble();</tspan>      // silently rounds to 2⁵³</text>
  <text x="40" y="325" class="e2-t e2-label"><tspan class="e2-mn">d.toInt();</tspan>                       // = 9007199254740992  ← lost a digit</text>
</svg>
