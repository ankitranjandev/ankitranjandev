<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-label="Decision flowchart for choosing a collection">
  <defs>
    <marker id="m-flow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--svg-text-secondary, #475569)"/></marker>
  </defs>
  <style>
    .d-flow-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .d-flow-title { font-size: 16px; font-weight: 600; }
    .d-flow-q { font-size: 14px; font-weight: 500; }
    .d-flow-yn { font-size: 12px; font-weight: 600; fill: var(--svg-text-secondary, #475569); }
    .d-flow-result { font-size: 20px; font-weight: 700; fill: #ffffff; }
    .d-flow-resultlbl { font-size: 11px; fill: #ffffff; }
    .d-flow-diamond { fill: var(--svg-amber-fill, #fef3c7); stroke: var(--svg-amber, #f59e0b); }
    .d-flow-arrow { stroke: var(--svg-text-secondary, #475569); }
    .d-flow-map-box { fill: var(--svg-purple, #9333ea); stroke: var(--svg-purple-dark, #7e22ce); }
    .d-flow-list-box { fill: var(--svg-dart-blue, #0175C2); stroke: var(--svg-dart-blue-stroke, #0369a1); }
    .d-flow-set-box { fill: var(--svg-green, #10b981); stroke: var(--svg-green-dark, #047857); }
  </style>

  <text x="360" y="28" text-anchor="middle" class="d-flow-t d-flow-title">Which collection should I use?</text>

  <!-- Question 1 -->
  <path d="M 360 60 L 540 110 L 360 160 L 180 110 Z" class="d-flow-diamond" stroke-width="2"/>
  <text x="360" y="105" text-anchor="middle" class="d-flow-t d-flow-q">Need to look up</text>
  <text x="360" y="122" text-anchor="middle" class="d-flow-t d-flow-q">by a key (like a name)?</text>

  <!-- Yes arrow to Map -->
  <line x1="540" y1="110" x2="610" y2="110" class="d-flow-arrow" stroke-width="2" marker-end="url(#m-flow)"/>
  <text x="572" y="100" text-anchor="middle" class="d-flow-t d-flow-yn">yes</text>

  <!-- Map result -->
  <rect x="615" y="80" width="90" height="60" class="d-flow-map-box" stroke-width="2" rx="6"/>
  <text x="660" y="108" text-anchor="middle" class="d-flow-t d-flow-result">Map</text>
  <text x="660" y="128" text-anchor="middle" class="d-flow-t d-flow-resultlbl">name → number</text>

  <!-- No arrow down -->
  <line x1="360" y1="160" x2="360" y2="195" class="d-flow-arrow" stroke-width="2" marker-end="url(#m-flow)"/>
  <text x="375" y="180" class="d-flow-t d-flow-yn">no</text>

  <!-- Question 2 -->
  <path d="M 360 200 L 540 250 L 360 300 L 180 250 Z" class="d-flow-diamond" stroke-width="2"/>
  <text x="360" y="240" text-anchor="middle" class="d-flow-t d-flow-q">Need ordered</text>
  <text x="360" y="257" text-anchor="middle" class="d-flow-t d-flow-q">access by position?</text>
  <text x="360" y="276" text-anchor="middle" class="d-flow-t d-flow-q">(or duplicates?)</text>

  <!-- Yes arrow to List -->
  <line x1="540" y1="250" x2="610" y2="250" class="d-flow-arrow" stroke-width="2" marker-end="url(#m-flow)"/>
  <text x="572" y="240" text-anchor="middle" class="d-flow-t d-flow-yn">yes</text>

  <!-- List result -->
  <rect x="615" y="220" width="90" height="60" class="d-flow-list-box" stroke-width="2" rx="6"/>
  <text x="660" y="248" text-anchor="middle" class="d-flow-t d-flow-result">List</text>
  <text x="660" y="268" text-anchor="middle" class="d-flow-t d-flow-resultlbl">ordered, indexed</text>

  <!-- No arrow down -->
  <line x1="360" y1="300" x2="360" y2="335" class="d-flow-arrow" stroke-width="2" marker-end="url(#m-flow)"/>
  <text x="375" y="320" class="d-flow-t d-flow-yn">no</text>

  <!-- Set result -->
  <rect x="285" y="340" width="150" height="60" class="d-flow-set-box" stroke-width="2" rx="6"/>
  <text x="360" y="368" text-anchor="middle" class="d-flow-t d-flow-result">Set</text>
  <text x="360" y="388" text-anchor="middle" class="d-flow-t d-flow-resultlbl">unique items, fast lookup</text>

  <!-- Caption -->
  <text x="360" y="445" text-anchor="middle" class="d-flow-t" font-size="12" fill="var(--svg-text-secondary, #475569)" font-style="italic">When all three would work, prefer the most restrictive — it documents intent.</text>
</svg>
