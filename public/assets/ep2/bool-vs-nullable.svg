<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="bool vs nullable bool possible values">
  <style>
    .b2-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .b2-title { font-size: 16px; font-weight: 600; }
    .b2-type { font-size: 17px; font-weight: 700; font-family: "SF Mono", Menlo, monospace; }
    .b2-val { font-family: "SF Mono", Menlo, monospace; font-size: 14px; font-weight: 700; }
    .b2-cap { font-size: 13px; fill: #475569; font-style: italic; }
    .b2-note { font-size: 12px; fill: #64748b; }
    .b2-footer { font-size: 13px; fill: #475569; }
  </style>

  <text x="360" y="28" text-anchor="middle" class="b2-t b2-title">What values can these types hold?</text>

  <!-- Left: bool -->
  <text x="180" y="70" text-anchor="middle" class="b2-t b2-type">bool</text>
  <text x="180" y="92" text-anchor="middle" class="b2-t b2-note">can hold one of:</text>

  <rect x="80" y="115" width="100" height="60" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="130" y="152" text-anchor="middle" class="b2-t b2-val">true</text>

  <rect x="180" y="115" width="100" height="60" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="4"/>
  <text x="230" y="152" text-anchor="middle" class="b2-t b2-val">false</text>

  <text x="180" y="205" text-anchor="middle" class="b2-t b2-cap">two possible values</text>

  <!-- Separator -->
  <line x1="360" y1="55" x2="360" y2="225" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Right: bool? -->
  <text x="540" y="70" text-anchor="middle" class="b2-t b2-type">bool?</text>
  <text x="540" y="92" text-anchor="middle" class="b2-t b2-note">can hold one of:</text>

  <rect x="420" y="115" width="80" height="60" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="460" y="152" text-anchor="middle" class="b2-t b2-val">true</text>

  <rect x="500" y="115" width="80" height="60" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="4"/>
  <text x="540" y="152" text-anchor="middle" class="b2-t b2-val">false</text>

  <rect x="580" y="115" width="80" height="60" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" rx="4"/>
  <text x="620" y="152" text-anchor="middle" class="b2-t b2-val">null</text>

  <text x="540" y="205" text-anchor="middle" class="b2-t b2-cap">three possible values</text>

  <text x="360" y="255" text-anchor="middle" class="b2-t b2-footer">The ? on the type opts in to nullability.</text>
</svg>
