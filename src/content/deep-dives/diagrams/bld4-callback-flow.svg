<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="The itemBuilder callback receives a BuildContext and an index and returns one Widget, called once per visible item" style="max-width: 100%; height: auto;"><style>.bld4-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.bld4-title{font-size:16px;font-weight:600}.bld4-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#1e293b}.bld4-cap{font-size:11px;fill:#64748b}.bld4-h{font-size:13px;font-weight:600}</style><text x="360" y="28" text-anchor="middle" class="bld4-t bld4-title">(context, index) =&gt; Widget, once per visible row</text><rect x="40" y="70" width="150" height="44" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="6"/><text x="115" y="97" text-anchor="middle" class="bld4-t bld4-mn">BuildContext</text><rect x="40" y="130" width="150" height="44" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="6"/><text x="115" y="157" text-anchor="middle" class="bld4-t bld4-mn">index: 42</text><line x1="190" y1="92" x2="280" y2="118" stroke="#94a3b8" stroke-width="2" marker-end="url(#bld4-a)"/><line x1="190" y1="152" x2="280" y2="128" stroke="#94a3b8" stroke-width="2" marker-end="url(#bld4-a)"/><rect x="284" y="98" width="180" height="50" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="8"/><text x="374" y="120" text-anchor="middle" class="bld4-t bld4-h">itemBuilder</text><text x="374" y="138" text-anchor="middle" class="bld4-t bld4-cap">the build strategy</text><line x1="464" y1="123" x2="544" y2="123" stroke="#9333ea" stroke-width="2" marker-end="url(#bld4-p)"/><text x="504" y="113" text-anchor="middle" class="bld4-t bld4-cap">returns</text><rect x="548" y="98" width="140" height="50" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/><text x="618" y="128" text-anchor="middle" class="bld4-t bld4-mn">Widget</text><rect x="60" y="206" width="600" height="86" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" rx="8"/><text x="80" y="232" class="bld4-t bld4-cap">Flutter calls it on demand, only for rows in or near the viewport:</text><text x="80" y="258" class="bld4-t bld4-mn">itemBuilder: (context, i) =&gt; ListTile(title: Text(items[i]))</text><text x="80" y="282" class="bld4-t bld4-cap">Scroll down, row 43 appears, Flutter calls itemBuilder(context, 43).</text><defs><marker id="bld4-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker><marker id="bld4-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker></defs></svg>
