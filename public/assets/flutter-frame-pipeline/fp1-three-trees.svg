<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" style="max-width: 100%; height: auto;" role="img" aria-label="Flutter's three trees: Widget tree (rebuilt), Element tree (persists), RenderObject tree (mutated)">
  <defs>
    <marker id="fp1-3t-arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--svg-dart-blue, #0175C2)"/>
    </marker>
    <marker id="fp1-3t-arrow-down" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,0 L4,8 L8,0 Z" fill="var(--svg-text-secondary, #475569)"/>
    </marker>
  </defs>
  <style>
    .fp13-title { font: bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .fp13-label { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .fp13-small { font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text-muted, #64748b); }
    .fp13-code { font: 600 10px "SF Mono", Menlo, Monaco, monospace; fill: var(--svg-text, #1e293b); }
    .fp13-node { font: 600 11px "SF Mono", Menlo, Monaco, monospace; fill: var(--svg-text, #1e293b); }
  </style>

  <text x="360" y="28" text-anchor="middle" class="fp13-title">The Three Trees: Widget → Element → RenderObject</text>

  <!-- Column Headers -->
  <g transform="translate(0, 45)">
    <!-- Widget Tree Column -->
    <rect x="30" y="0" width="200" height="35" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="2" rx="6"/>
    <text x="130" y="15" text-anchor="middle" class="fp13-label">Widget Tree</text>
    <text x="130" y="28" text-anchor="middle" class="fp13-small">Immutable. Rebuilt constantly.</text>

    <!-- Element Tree Column -->
    <rect x="260" y="0" width="200" height="35" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="2" rx="6"/>
    <text x="360" y="15" text-anchor="middle" class="fp13-label">Element Tree</text>
    <text x="360" y="28" text-anchor="middle" class="fp13-small">Mutable. Long-lived.</text>

    <!-- RenderObject Tree Column -->
    <rect x="490" y="0" width="200" height="35" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="2" rx="6"/>
    <text x="590" y="15" text-anchor="middle" class="fp13-label">RenderObject Tree</text>
    <text x="590" y="28" text-anchor="middle" class="fp13-small">Layout + Paint. Expensive.</text>
  </g>

  <!-- Trees -->
  <g transform="translate(0, 100)">
    <!-- Widget Tree Nodes -->
    <g transform="translate(30, 0)">
      <rect x="50" y="0" width="100" height="28" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="1.5" rx="4"/>
      <text x="100" y="18" text-anchor="middle" class="fp13-node">Container</text>

      <line x1="100" y1="28" x2="100" y2="45" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>

      <rect x="50" y="45" width="100" height="28" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="1.5" rx="4"/>
      <text x="100" y="63" text-anchor="middle" class="fp13-node">Padding</text>

      <line x1="100" y1="73" x2="100" y2="90" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>

      <rect x="50" y="90" width="100" height="28" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="1.5" rx="4"/>
      <text x="100" y="108" text-anchor="middle" class="fp13-node">Text('Hi')</text>

      <text x="100" y="140" text-anchor="middle" class="fp13-small">New objects</text>
      <text x="100" y="152" text-anchor="middle" class="fp13-small">every rebuild</text>
    </g>

    <!-- Arrows Widget → Element -->
    <g transform="translate(200, 0)">
      <line x1="0" y1="14" x2="30" y2="14" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" marker-end="url(#fp1-3t-arrow)"/>
      <line x1="0" y1="59" x2="30" y2="59" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" marker-end="url(#fp1-3t-arrow)"/>
      <line x1="0" y1="104" x2="30" y2="104" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" marker-end="url(#fp1-3t-arrow)"/>
    </g>

    <!-- Element Tree Nodes -->
    <g transform="translate(260, 0)">
      <rect x="50" y="0" width="100" height="28" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" rx="4"/>
      <text x="100" y="18" text-anchor="middle" class="fp13-node">Element</text>

      <line x1="100" y1="28" x2="100" y2="45" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>

      <rect x="50" y="45" width="100" height="28" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" rx="4"/>
      <text x="100" y="63" text-anchor="middle" class="fp13-node">Element</text>

      <line x1="100" y1="73" x2="100" y2="90" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>

      <rect x="50" y="90" width="100" height="28" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" rx="4"/>
      <text x="100" y="108" text-anchor="middle" class="fp13-node">Element</text>

      <text x="100" y="140" text-anchor="middle" class="fp13-small">Same objects</text>
      <text x="100" y="152" text-anchor="middle" class="fp13-small">across rebuilds</text>
    </g>

    <!-- Arrows Element → RenderObject -->
    <g transform="translate(430, 0)">
      <line x1="0" y1="14" x2="30" y2="14" stroke="var(--svg-green, #10b981)" stroke-width="1.5" marker-end="url(#fp1-3t-arrow)"/>
      <line x1="0" y1="59" x2="30" y2="59" stroke="var(--svg-green, #10b981)" stroke-width="1.5" marker-end="url(#fp1-3t-arrow)"/>
      <line x1="0" y1="104" x2="30" y2="104" stroke="var(--svg-green, #10b981)" stroke-width="1.5" marker-end="url(#fp1-3t-arrow)"/>
    </g>

    <!-- RenderObject Tree Nodes -->
    <g transform="translate(490, 0)">
      <rect x="50" y="0" width="100" height="28" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1.5" rx="4"/>
      <text x="100" y="18" text-anchor="middle" class="fp13-node">RenderBox</text>

      <line x1="100" y1="28" x2="100" y2="45" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>

      <rect x="50" y="45" width="100" height="28" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1.5" rx="4"/>
      <text x="100" y="63" text-anchor="middle" class="fp13-node">RenderPadding</text>

      <line x1="100" y1="73" x2="100" y2="90" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>

      <rect x="50" y="90" width="100" height="28" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1.5" rx="4"/>
      <text x="100" y="108" text-anchor="middle" class="fp13-node">RenderParagraph</text>

      <text x="100" y="140" text-anchor="middle" class="fp13-small">Mutated in place</text>
      <text x="100" y="152" text-anchor="middle" class="fp13-small">when text changes</text>
    </g>
  </g>

  <!-- Key insight box -->
  <g transform="translate(30, 280)">
    <rect x="0" y="0" width="660" height="55" fill="var(--svg-purple-fill, #f3e8ff)" stroke="var(--svg-purple, #9333ea)" stroke-width="2" rx="6"/>
    <text x="330" y="18" text-anchor="middle" class="fp13-label" fill="var(--svg-purple, #9333ea)">The Reuse Mechanism</text>
    <text x="330" y="35" text-anchor="middle" class="fp13-code">Element.updateChild()</text>
    <text x="330" y="48" text-anchor="middle" class="fp13-small">If runtimeType + Key match, reuse Element and mutate RenderObject. Otherwise, tear down and rebuild.</text>
  </g>

  <!-- State callout -->
  <g transform="translate(30, 345)">
    <rect x="0" y="0" width="660" height="40" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="6"/>
    <text x="330" y="15" text-anchor="middle" class="fp13-code">State lives on the Element, not the Widget.</text>
    <text x="330" y="32" text-anchor="middle" class="fp13-small">State survives rebuilds because the Element persists. A mismatched Key destroys the Element and its State.</text>
  </g>
</svg>
