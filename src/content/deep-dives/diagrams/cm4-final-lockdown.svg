<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="Final class lockdown" style="max-width: 100%; height: auto;">
  <style>
    .cm4-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:var(--svg-text, #1e293b)}
    .cm4-title{font-size:15px;font-weight:600}
    .cm4-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px}
    .cm4-label{font-size:11px;fill:var(--svg-text-muted, #64748b)}
    .cm4-desc{font-size:10px;fill:var(--svg-text-secondary, #475569)}
  </style>

  <text x="360" y="24" text-anchor="middle" class="cm4-t cm4-title">final class — complete lockdown outside your library</text>

  <!-- Final class -->
  <rect x="260" y="50" width="200" height="60" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" stroke-width="3" rx="8"/>
  <text x="360" y="85" text-anchor="middle" class="cm4-t cm4-mn" fill="var(--svg-red, #dc2626)" font-weight="700">final class String</text>

  <!-- Arrows pointing to blocked actions -->
  <line x1="260" y1="130" x2="140" y2="170" stroke="var(--svg-red, #dc2626)" stroke-width="2"/>
  <line x1="360" y1="110" x2="360" y2="170" stroke="var(--svg-red, #dc2626)" stroke-width="2"/>
  <line x1="460" y1="130" x2="580" y2="170" stroke="var(--svg-red, #dc2626)" stroke-width="2"/>

  <!-- Cannot extend -->
  <rect x="40" y="170" width="200" height="50" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" stroke-width="1" rx="6" opacity="0.7"/>
  <text x="140" y="192" text-anchor="middle" class="cm4-t cm4-mn" fill="var(--svg-red, #dc2626)">class MyString</text>
  <text x="140" y="208" text-anchor="middle" class="cm4-t cm4-mn" fill="var(--svg-red, #dc2626)" font-size="10">extends String</text>
  <line x1="40" y1="170" x2="240" y2="220" stroke="var(--svg-red, #dc2626)" stroke-width="3"/>
  <line x1="40" y1="220" x2="240" y2="170" stroke="var(--svg-red, #dc2626)" stroke-width="3"/>
  <text x="140" y="245" text-anchor="middle" class="cm4-t cm4-desc">No extending</text>

  <!-- Cannot implement -->
  <rect x="260" y="170" width="200" height="50" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" stroke-width="1" rx="6" opacity="0.7"/>
  <text x="360" y="192" text-anchor="middle" class="cm4-t cm4-mn" fill="var(--svg-red, #dc2626)">class FakeString</text>
  <text x="360" y="208" text-anchor="middle" class="cm4-t cm4-mn" fill="var(--svg-red, #dc2626)" font-size="10">implements String</text>
  <line x1="260" y1="170" x2="460" y2="220" stroke="var(--svg-red, #dc2626)" stroke-width="3"/>
  <line x1="260" y1="220" x2="460" y2="170" stroke="var(--svg-red, #dc2626)" stroke-width="3"/>
  <text x="360" y="245" text-anchor="middle" class="cm4-t cm4-desc">No implementing</text>

  <!-- Can construct -->
  <rect x="480" y="170" width="200" height="50" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="2" rx="6"/>
  <text x="580" y="195" text-anchor="middle" class="cm4-t cm4-mn" fill="var(--svg-green-dark, #059669)">var s = 'hello';</text>
  <text x="580" y="212" text-anchor="middle" class="cm4-t cm4-desc">String.fromCharCodes([...])</text>
  <text x="580" y="245" text-anchor="middle" class="cm4-t cm4-desc" fill="var(--svg-green, #10b981)">Can use normally</text>

  <text x="360" y="275" text-anchor="middle" class="cm4-t cm4-label">The type is frozen — no subtyping allowed outside the defining library</text>
</svg>
