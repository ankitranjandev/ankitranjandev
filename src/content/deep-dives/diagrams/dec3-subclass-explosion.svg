<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="On the left a subclass for every combination of padding and border multiplies out of control, on the right three small reusable wrappers you stack in any order" style="max-width: 100%; height: auto;"><style>.dec3-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.dec3-title{font-size:16px;font-weight:600}.dec3-bad{font-size:13px;font-weight:600;fill:#dc2626}.dec3-good{font-size:13px;font-weight:600;fill:#10b981}.dec3-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:10px;fill:#475569}.dec3-h{font-size:12px;font-weight:600}.dec3-label{font-size:11px;fill:#64748b}.dec3-dots{font-size:18px;font-weight:700;fill:#94a3b8}</style><text x="360" y="28" text-anchor="middle" class="dec3-t dec3-title">A class per combination, or a wrapper per feature</text><rect x="30" y="48" width="320" height="268" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="74" text-anchor="middle" class="dec3-t dec3-bad">A subclass for every mix</text><rect x="46" y="90" width="138" height="30" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="115" y="110" text-anchor="middle" class="dec3-t dec3-mn">PaddedText</text><rect x="196" y="90" width="138" height="30" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="265" y="110" text-anchor="middle" class="dec3-t dec3-mn">BorderedText</text><rect x="46" y="128" width="138" height="30" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="115" y="148" text-anchor="middle" class="dec3-t dec3-mn">OpaqueText</text><rect x="196" y="128" width="138" height="30" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="265" y="148" text-anchor="middle" class="dec3-t dec3-mn">PaddedBordered</text><rect x="46" y="166" width="138" height="30" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="115" y="186" text-anchor="middle" class="dec3-t dec3-mn">BorderedOpaque</text><rect x="196" y="166" width="138" height="30" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="265" y="186" text-anchor="middle" class="dec3-t dec3-mn">PaddedOpaque</text><text x="190" y="222" text-anchor="middle" class="dec3-t dec3-dots">…</text><text x="190" y="256" text-anchor="middle" class="dec3-t dec3-h">Every feature you add</text><text x="190" y="292" text-anchor="middle" class="dec3-t dec3-bad">doubles the table</text><rect x="370" y="48" width="320" height="268" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="74" text-anchor="middle" class="dec3-t dec3-good">Three wrappers you stack</text><rect x="446" y="92" width="168" height="32" fill="#ede9fe" stroke="#9333ea" stroke-width="1.8" rx="6"/><text x="530" y="113" text-anchor="middle" class="dec3-t dec3-mn">Padding</text><rect x="446" y="132" width="168" height="32" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.8" rx="6"/><text x="530" y="153" text-anchor="middle" class="dec3-t dec3-mn">DecoratedBox</text><rect x="446" y="172" width="168" height="32" fill="#d1fae5" stroke="#10b981" stroke-width="1.8" rx="6"/><text x="530" y="193" text-anchor="middle" class="dec3-t dec3-mn">Opacity</text><line x1="530" y1="124" x2="530" y2="132" stroke="#94a3b8" stroke-width="1.5"/><line x1="530" y1="164" x2="530" y2="172" stroke="#94a3b8" stroke-width="1.5"/><text x="530" y="240" text-anchor="middle" class="dec3-t dec3-label">stack any subset, any order</text><text x="530" y="270" text-anchor="middle" class="dec3-t dec3-h">New feature?</text><text x="530" y="292" text-anchor="middle" class="dec3-t dec3-good">One more wrapper, not a row</text></svg>
