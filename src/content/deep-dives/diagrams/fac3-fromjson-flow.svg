<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="A fromJson factory takes an untyped Map of decoded JSON, validates and reads its fields, and returns a typed Dart object" style="max-width: 100%; height: auto;"><style>.fac3-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.fac3-title{font-size:16px;font-weight:600}.fac3-h{font-size:13px;font-weight:600}.fac3-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#475569}.fac3-mns{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#1e293b}.fac3-label{font-size:11px;fill:#64748b}.fac3-cap{font-size:12px;fill:#64748b}</style><text x="360" y="28" text-anchor="middle" class="fac3-t fac3-title">From an untyped Map to a typed object</text><rect x="28" y="74" width="178" height="120" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" rx="8"/><text x="117" y="98" text-anchor="middle" class="fac3-t fac3-h">Map&lt;String, dynamic&gt;</text><text x="117" y="115" text-anchor="middle" class="fac3-t fac3-label">decoded JSON</text><text x="44" y="142" class="fac3-t fac3-mns">{</text><text x="58" y="160" class="fac3-t fac3-mns">'id': 7,</text><text x="58" y="178" class="fac3-t fac3-mns">'name': 'Ada'</text><text x="44" y="188" class="fac3-t fac3-mns">}</text><line x1="206" y1="134" x2="256" y2="134" stroke="#94a3b8" stroke-width="2" marker-end="url(#fac3-a)"/><rect x="258" y="74" width="204" height="120" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="8"/><text x="360" y="98" text-anchor="middle" class="fac3-t fac3-h">User.fromJson(map)</text><text x="360" y="114" text-anchor="middle" class="fac3-t fac3-label">factory constructor</text><text x="274" y="140" class="fac3-t fac3-mn">read fields</text><text x="274" y="158" class="fac3-t fac3-mn">validate types</text><text x="274" y="176" class="fac3-t fac3-mn">return User._(...)</text><line x1="462" y1="134" x2="512" y2="134" stroke="#94a3b8" stroke-width="2" marker-end="url(#fac3-a)"/><rect x="514" y="74" width="178" height="120" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="8"/><text x="603" y="98" text-anchor="middle" class="fac3-t fac3-h">User</text><text x="603" y="115" text-anchor="middle" class="fac3-t fac3-label">typed instance</text><text x="530" y="142" class="fac3-t fac3-mns">id:   int  7</text><text x="530" y="166" class="fac3-t fac3-mns">name: 'Ada'</text><text x="360" y="240" text-anchor="middle" class="fac3-t fac3-cap">The factory is the one place that knows the JSON shape.</text><text x="360" y="262" text-anchor="middle" class="fac3-t fac3-cap">The rest of the app only ever sees a typed User.</text><defs><marker id="fac3-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker></defs></svg>