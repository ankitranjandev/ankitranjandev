<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Strategy structure: a context depends on a strategy interface, and three concrete strategies implement that interface, so any one can fill the slot" style="max-width: 100%; height: auto;"><style>.str2-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.str2-title{font-size:16px;font-weight:600}.str2-h{font-size:14px;font-weight:600}.str2-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#475569}.str2-label{font-size:12px;fill:#64748b}.str2-cap{font-size:12px;fill:#64748b}</style><text x="360" y="30" text-anchor="middle" class="str2-t str2-title">Context leans on the interface, not the details</text><rect x="58" y="92" width="200" height="92" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="8"/><text x="158" y="124" text-anchor="middle" class="str2-t str2-h">Checkout</text><text x="158" y="148" text-anchor="middle" class="str2-t str2-label">the context</text><text x="158" y="170" text-anchor="middle" class="str2-t str2-mn">strategy.pay()</text><rect x="462" y="92" width="200" height="92" fill="#ffffff" stroke="#9333ea" stroke-width="2" stroke-dasharray="6 4" rx="8"/><text x="562" y="124" text-anchor="middle" class="str2-t str2-h">PaymentStrategy</text><text x="562" y="148" text-anchor="middle" class="str2-t str2-label">the interface</text><text x="562" y="170" text-anchor="middle" class="str2-t str2-mn">void pay();</text><line x1="258" y1="138" x2="462" y2="138" stroke="#9333ea" stroke-width="2" marker-end="url(#str2-a)"/><text x="360" y="128" text-anchor="middle" class="str2-t str2-label">depends on</text><rect x="58" y="258" width="184" height="62" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="8"/><text x="150" y="284" text-anchor="middle" class="str2-t str2-h">CardPayment</text><text x="150" y="304" text-anchor="middle" class="str2-t str2-mn">pay() {...}</text><rect x="268" y="258" width="184" height="62" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="8"/><text x="360" y="284" text-anchor="middle" class="str2-t str2-h">PayPalPayment</text><text x="360" y="304" text-anchor="middle" class="str2-t str2-mn">pay() {...}</text><rect x="478" y="258" width="184" height="62" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="8"/><text x="570" y="284" text-anchor="middle" class="str2-t str2-h">UpiPayment</text><text x="570" y="304" text-anchor="middle" class="str2-t str2-mn">pay() {...}</text><line x1="150" y1="258" x2="528" y2="186" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#str2-g)"/><line x1="360" y1="258" x2="556" y2="186" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#str2-g)"/><line x1="570" y1="258" x2="592" y2="186" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#str2-g)"/><text x="430" y="228" text-anchor="middle" class="str2-t str2-label">implements</text><text x="360" y="346" text-anchor="middle" class="str2-t str2-cap">Swap which concrete fills the slot. Checkout never notices.</text><defs><marker id="str2-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker><marker id="str2-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker></defs></svg>