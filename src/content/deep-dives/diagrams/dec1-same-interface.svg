<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="A decorator wraps a component, exposes the same build method, adds its own piece, then delegates the call down to the wrapped child" style="max-width: 100%; height: auto;"><style>.dec1-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.dec1-title{font-size:16px;font-weight:600}.dec1-h{font-size:14px;font-weight:600}.dec1-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#475569}.dec1-label{font-size:12px;fill:#64748b}.dec1-cap{font-size:12px;fill:#64748b}.dec1-add{font-size:12px;font-weight:600;fill:#9333ea}</style><text x="360" y="30" text-anchor="middle" class="dec1-t dec1-title">Same interface in, same interface out — plus one thing</text><rect x="40" y="92" width="190" height="150" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="10"/><text x="135" y="120" text-anchor="middle" class="dec1-t dec1-h">Decorator</text><text x="135" y="142" text-anchor="middle" class="dec1-t dec1-label">has a child</text><text x="135" y="170" text-anchor="middle" class="dec1-t dec1-add">add my piece</text><line x1="135" y1="182" x2="135" y2="200" stroke="#9333ea" stroke-width="2" marker-end="url(#dec1-a)"/><text x="135" y="222" text-anchor="middle" class="dec1-t dec1-mn">child.build()</text><rect x="290" y="124" width="170" height="86" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="10"/><text x="375" y="158" text-anchor="middle" class="dec1-t dec1-h">Component</text><text x="375" y="182" text-anchor="middle" class="dec1-t dec1-mn">build()</text><line x1="230" y1="167" x2="290" y2="167" stroke="#9333ea" stroke-width="2" marker-end="url(#dec1-a)"/><text x="260" y="156" text-anchor="middle" class="dec1-t dec1-label">delegates</text><rect x="520" y="124" width="170" height="86" fill="#ffffff" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" rx="10"/><text x="605" y="152" text-anchor="middle" class="dec1-t dec1-h">build()</text><text x="605" y="176" text-anchor="middle" class="dec1-t dec1-label">one interface</text><text x="605" y="196" text-anchor="middle" class="dec1-t dec1-mn">both expose it</text><line x1="375" y1="124" x2="375" y2="96" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3"/><line x1="135" y1="92" x2="135" y2="70" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3"/><line x1="135" y1="70" x2="540" y2="70" stroke="#94a3b8" stroke-width="1.5"/><line x1="375" y1="96" x2="375" y2="70" stroke="#94a3b8" stroke-width="1.5"/><line x1="540" y1="70" x2="540" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dec1-g)"/><text x="360" y="284" text-anchor="middle" class="dec1-t dec1-cap">The decorator IS a component too — so it can wrap, or be wrapped, without anyone noticing.</text><defs><marker id="dec1-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker><marker id="dec1-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker></defs></svg>
