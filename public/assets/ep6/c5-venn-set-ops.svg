<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="Set operations as Venn diagrams">
  <defs>
    <clipPath id="vc-leftA"><circle cx="100" cy="150" r="55"/></clipPath>
    <clipPath id="vc-leftB"><circle cx="160" cy="150" r="55"/></clipPath>
    <clipPath id="vc-midA"><circle cx="340" cy="150" r="55"/></clipPath>
    <clipPath id="vc-midB"><circle cx="400" cy="150" r="55"/></clipPath>
    <clipPath id="vc-rightA"><circle cx="580" cy="150" r="55"/></clipPath>
    <clipPath id="vc-rightB"><circle cx="640" cy="150" r="55"/></clipPath>
  </defs>
  <style>
    .d-vn-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .d-vn-title { font-size: 16px; font-weight: 600; }
    .d-vn-op { font-size: 15px; font-weight: 700; }
    .d-vn-mn { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 12px; font-weight: 600; }
    .d-vn-result { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 12px; font-weight: 700; fill: #1e293b; }
    .d-vn-label { font-size: 11px; fill: #64748b; }
  </style>

  <text x="360" y="26" text-anchor="middle" class="d-vn-t d-vn-title">Set operations — A = {1,2,3,4}, B = {3,4,5,6}</text>

  <!-- UNION -->
  <text x="130" y="60" text-anchor="middle" class="d-vn-t d-vn-op" fill="#0175C2">union</text>
  <text x="130" y="78" text-anchor="middle" class="d-vn-t d-vn-mn" fill="#475569">a.union(b)</text>

  <!-- Union: both circles fully shaded -->
  <circle cx="100" cy="150" r="55" fill="#dbeafe" stroke="#0175C2" stroke-width="2" fill-opacity="0.9"/>
  <circle cx="160" cy="150" r="55" fill="#dbeafe" stroke="#0175C2" stroke-width="2" fill-opacity="0.9"/>
  <text x="78" y="135" class="d-vn-t d-vn-mn">A</text>
  <text x="178" y="135" class="d-vn-t d-vn-mn">B</text>
  <text x="75" y="158" class="d-vn-t d-vn-mn">1</text>
  <text x="88" y="172" class="d-vn-t d-vn-mn">2</text>
  <text x="125" y="158" class="d-vn-t d-vn-mn">3</text>
  <text x="125" y="172" class="d-vn-t d-vn-mn">4</text>
  <text x="170" y="158" class="d-vn-t d-vn-mn">5</text>
  <text x="180" y="172" class="d-vn-t d-vn-mn">6</text>

  <text x="130" y="245" text-anchor="middle" class="d-vn-t d-vn-result">{1, 2, 3, 4, 5, 6}</text>
  <text x="130" y="262" text-anchor="middle" class="d-vn-t d-vn-label">all elements from either</text>

  <!-- INTERSECTION -->
  <text x="370" y="60" text-anchor="middle" class="d-vn-t d-vn-op" fill="#10b981">intersection</text>
  <text x="370" y="78" text-anchor="middle" class="d-vn-t d-vn-mn" fill="#475569">a.intersection(b)</text>

  <!-- Intersection: only overlap shaded -->
  <circle cx="340" cy="150" r="55" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="400" cy="150" r="55" fill="none" stroke="#10b981" stroke-width="2"/>
  <!-- The overlap region: clip both circles together -->
  <g clip-path="url(#vc-midA)">
    <circle cx="400" cy="150" r="55" fill="#d1fae5" fill-opacity="0.95"/>
  </g>
  <!-- Re-stroke circles on top -->
  <circle cx="340" cy="150" r="55" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="400" cy="150" r="55" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="318" y="135" class="d-vn-t d-vn-mn">A</text>
  <text x="418" y="135" class="d-vn-t d-vn-mn">B</text>
  <text x="315" y="158" class="d-vn-t d-vn-mn" fill="#94a3b8">1</text>
  <text x="328" y="172" class="d-vn-t d-vn-mn" fill="#94a3b8">2</text>
  <text x="365" y="158" class="d-vn-t d-vn-mn">3</text>
  <text x="365" y="172" class="d-vn-t d-vn-mn">4</text>
  <text x="410" y="158" class="d-vn-t d-vn-mn" fill="#94a3b8">5</text>
  <text x="420" y="172" class="d-vn-t d-vn-mn" fill="#94a3b8">6</text>

  <text x="370" y="245" text-anchor="middle" class="d-vn-t d-vn-result">{3, 4}</text>
  <text x="370" y="262" text-anchor="middle" class="d-vn-t d-vn-label">elements in both</text>

  <!-- DIFFERENCE -->
  <text x="610" y="60" text-anchor="middle" class="d-vn-t d-vn-op" fill="#dc2626">difference</text>
  <text x="610" y="78" text-anchor="middle" class="d-vn-t d-vn-mn" fill="#475569">a.difference(b)</text>

  <!-- Difference A-B: A minus the overlap -->
  <g clip-path="url(#vc-rightA)">
    <rect x="500" y="80" width="200" height="160" fill="#fee2e2" fill-opacity="0.95"/>
    <circle cx="640" cy="150" r="55" fill="#ffffff"/>
  </g>
  <circle cx="580" cy="150" r="55" fill="none" stroke="#dc2626" stroke-width="2"/>
  <circle cx="640" cy="150" r="55" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="558" y="135" class="d-vn-t d-vn-mn">A</text>
  <text x="658" y="135" class="d-vn-t d-vn-mn">B</text>
  <text x="555" y="158" class="d-vn-t d-vn-mn">1</text>
  <text x="568" y="172" class="d-vn-t d-vn-mn">2</text>
  <text x="605" y="158" class="d-vn-t d-vn-mn" fill="#94a3b8">3</text>
  <text x="605" y="172" class="d-vn-t d-vn-mn" fill="#94a3b8">4</text>
  <text x="650" y="158" class="d-vn-t d-vn-mn" fill="#94a3b8">5</text>
  <text x="660" y="172" class="d-vn-t d-vn-mn" fill="#94a3b8">6</text>

  <text x="610" y="245" text-anchor="middle" class="d-vn-t d-vn-result">{1, 2}</text>
  <text x="610" y="262" text-anchor="middle" class="d-vn-t d-vn-label">in A but not in B</text>

  <!-- Caption -->
  <text x="360" y="310" text-anchor="middle" class="d-vn-t" font-size="12" fill="#475569" font-style="italic">Dart's Set provides .union(), .intersection(), and .difference() out of the box.</text>
</svg>
