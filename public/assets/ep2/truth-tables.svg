  <text x="530" y="100" text-anchor="middle" class="b3-t b3-hdr">A</text>
  <text x="600" y="100" text-anchor="middle" class="b3-t b3-hdr">B</text>
  <text x="670" y="100" text-anchor="middle" class="b3-t b3-hdr">A || B</text>
  <line x1="500" y1="110" x2="710" y2="110" stroke="#cbd5e1" stroke-width="1"/>

  <rect x="505" y="125" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="530" y="148" text-anchor="middle" class="b3-t b3-val">T</text>
  <rect x="575" y="125" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="600" y="148" text-anchor="middle" class="b3-t b3-val">T</text>
  <rect x="645" y="125" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="670" y="148" text-anchor="middle" class="b3-t b3-val">T</text>

  <rect x="505" y="165" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="530" y="188" text-anchor="middle" class="b3-t b3-val">T</text>
  <rect x="575" y="165" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="600" y="188" text-anchor="middle" class="b3-t b3-val">F</text>
  <rect x="645" y="165" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="670" y="188" text-anchor="middle" class="b3-t b3-val">T</text>

  <rect x="505" y="205" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="530" y="228" text-anchor="middle" class="b3-t b3-val">F</text>
  <rect x="575" y="205" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="600" y="228" text-anchor="middle" class="b3-t b3-val">T</text>
  <rect x="645" y="205" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="670" y="228" text-anchor="middle" class="b3-t b3-val">T</text>

  <rect x="505" y="245" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="530" y="268" text-anchor="middle" class="b3-t b3-val">F</text>
  <rect x="575" y="245" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="600" y="268" text-anchor="middle" class="b3-t b3-val">F</text>
  <rect x="645" y="245" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="670" y="268" text-anchor="middle" class="b3-t b3-val">F</text>
</svg>
