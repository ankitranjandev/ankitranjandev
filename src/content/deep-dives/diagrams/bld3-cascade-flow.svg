<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="A cascade chain of build steps on one receiver, each returning the same object, flowing into a finished result" style="max-width: 100%; height: auto;"><style>.bld3-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.bld3-title{font-size:16px;font-weight:600}.bld3-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#1e293b}.bld3-tag{font-size:11px;font-weight:600;fill:#9333ea}.bld3-cap{font-size:11px;fill:#64748b}.bld3-out{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#065f46}</style><text x="360" y="28" text-anchor="middle" class="bld3-t bld3-title">Each .. returns the same buffer, then build</text><rect x="40" y="56" width="180" height="58" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="8"/><text x="130" y="82" text-anchor="middle" class="bld3-t bld3-mn">StringBuffer()</text><text x="130" y="102" text-anchor="middle" class="bld3-t bld3-cap">the receiver</text><line x1="130" y1="114" x2="130" y2="142" stroke="#9333ea" stroke-width="2" marker-end="url(#bld3-a)"/><text x="244" y="135" text-anchor="middle" class="bld3-t bld3-tag">..write('Hi ')</text><rect x="40" y="146" width="180" height="44" fill="#f5f3ff" stroke="#9333ea" stroke-width="1.5" rx="8"/><text x="130" y="173" text-anchor="middle" class="bld3-t bld3-mn">buffer: "Hi "</text><line x1="130" y1="190" x2="130" y2="214" stroke="#9333ea" stroke-width="2" marker-end="url(#bld3-a)"/><text x="248" y="207" text-anchor="middle" class="bld3-t bld3-tag">..write('there')</text><rect x="40" y="218" width="180" height="44" fill="#f5f3ff" stroke="#9333ea" stroke-width="1.5" rx="8"/><text x="130" y="245" text-anchor="middle" class="bld3-t bld3-mn">buffer: "Hi there"</text><line x1="220" y1="240" x2="320" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#bld3-g)"/><text x="270" y="230" text-anchor="middle" class="bld3-t bld3-cap">.toString()</text><rect x="330" y="216" width="200" height="48" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/><text x="430" y="245" text-anchor="middle" class="bld3-t bld3-out">"Hi there"</text><rect x="330" y="64" width="350" height="120" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" rx="8"/><text x="350" y="90" class="bld3-t bld3-cap">The whole chain, one expression:</text><text x="350" y="116" class="bld3-t bld3-mn">final s = (StringBuffer()</text><text x="364" y="138" class="bld3-t bld3-mn">..write('Hi ')</text><text x="364" y="160" class="bld3-t bld3-mn">..write('there'))</text><text x="364" y="178" class="bld3-t bld3-mn">.toString();</text><text x="430" y="290" text-anchor="middle" class="bld3-t bld3-cap">.. operates and discards its result; the object flows on.</text><defs><marker id="bld3-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker><marker id="bld3-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker></defs></svg>
