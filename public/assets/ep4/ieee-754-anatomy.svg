<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="IEEE 754 double precision 64-bit anatomy">
  <style>
    .d2-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .d2-title { font-size: 17px; font-weight: 600; }
    .d2-bits { font-size: 12px; font-weight: 600; fill: #64748b; font-family: "SF Mono", Menlo, monospace; }
    .d2-section { font-size: 15px; font-weight: 700; fill: #ffffff; }
    .d2-desc { font-size: 12px; fill: #475569; }
    .d2-formula { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 15px; font-weight: 600; fill: #1e293b; }
    .d2-note { font-size: 13px; fill: #475569; font-style: italic; }
  </style>

  <text x="360" y="32" text-anchor="middle" class="d2-t d2-title">IEEE 754 double-precision — 64 bits, split three ways</text>

  <!-- Bit counts above each section -->
  <text x="90" y="76" text-anchor="middle" class="d2-t d2-bits">1 bit</text>
  <text x="220" y="76" text-anchor="middle" class="d2-t d2-bits">11 bits</text>
  <text x="500" y="76" text-anchor="middle" class="d2-t d2-bits">52 bits</text>

  <!-- The bar itself -->
  <rect x="60" y="90" width="60" height="60" fill="#0175C2" stroke="#0369a1" stroke-width="2" rx="4"/>
  <text x="90" y="128" text-anchor="middle" class="d2-section">S</text>

  <rect x="120" y="90" width="200" height="60" fill="#9333ea" stroke="#7e22ce" stroke-width="2" rx="4"/>
  <text x="220" y="128" text-anchor="middle" class="d2-section">EXPONENT</text>

  <rect x="320" y="90" width="360" height="60" fill="#10b981" stroke="#047857" stroke-width="2" rx="4"/>
  <text x="500" y="128" text-anchor="middle" class="d2-section">MANTISSA</text>

  <!-- Descriptions below -->
  <text x="90" y="180" text-anchor="middle" class="d2-t d2-desc">sign</text>
  <text x="90" y="198" text-anchor="middle" class="d2-t d2-desc">0 = positive</text>
  <text x="90" y="214" text-anchor="middle" class="d2-t d2-desc">1 = negative</text>

  <text x="220" y="180" text-anchor="middle" class="d2-t d2-desc">where the point sits</text>
  <text x="220" y="198" text-anchor="middle" class="d2-t d2-desc">(the scale, a power of 2)</text>

  <text x="500" y="180" text-anchor="middle" class="d2-t d2-desc">the significant binary digits</text>
  <text x="500" y="198" text-anchor="middle" class="d2-t d2-desc">(with an implicit leading 1)</text>

  <!-- Formula -->
  <text x="360" y="252" text-anchor="middle" class="d2-formula">value = (−1)^sign × mantissa × 2^exponent</text>

  <!-- Range note -->
  <text x="360" y="290" text-anchor="middle" class="d2-t d2-note">Range: ±1.7 × 10³⁰⁸   ·   Precision: about 15–17 decimal digits</text>
</svg>
