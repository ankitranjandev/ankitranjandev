<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Why 0.1 is not exact in binary">
  <style>
    .d3-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .d3-title { font-size: 16px; font-weight: 600; }
    .d3-sub { font-size: 14px; font-weight: 600; fill: #475569; }
    .d3-mono { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 15px; }
    .d3-mono-small { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 13px; }
    .d3-label { font-size: 12px; fill: #64748b; }
    .d3-note { font-size: 13px; fill: #475569; font-style: italic; }
    .d3-repeat { fill: #dc2626; font-weight: 700; }
    .d3-cut { fill: #b45309; font-weight: 700; }
  </style>

  <text x="360" y="28" text-anchor="middle" class="d3-t d3-title">Some clean fractions in one base are messy in another</text>

  <!-- Top half: familiar example -->
  <text x="40" y="68" class="d3-t d3-sub">In decimal — we already know this:</text>

  <text x="60" y="110" class="d3-t d3-mono">1 / 3 = 0.</text>
  <text x="158" y="110" class="d3-t d3-mono d3-repeat">3333333333…</text>
  <text x="60" y="135" class="d3-t d3-label">an infinite repeating decimal, never exactly representable with a fixed number of digits</text>

  <!-- Separator -->
  <line x1="40" y1="170" x2="680" y2="170" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Bottom half: the binary version -->
  <text x="40" y="200" class="d3-t d3-sub">In binary — what doubles actually see:</text>

  <text x="60" y="240" class="d3-t d3-mono">0.1 (decimal) = 0.</text>
  <text x="231" y="240" class="d3-t d3-mono d3-repeat">000110011001100110011…</text>

  <text x="60" y="265" class="d3-t d3-label">an infinite repeating binary fraction</text>

  <!-- The cutoff -->
  <text x="60" y="305" class="d3-t d3-mono-small">a double has 52 mantissa bits, so the value gets</text>
  <text x="60" y="305" class="d3-t d3-mono-small" dx="345"><tspan class="d3-cut">cut off here ↓</tspan></text>

  <text x="60" y="335" class="d3-t d3-mono-small">stored value ≈ 0.1000000000000000055511151231257827…</text>

  <!-- Bottom note -->
  <text x="360" y="350" text-anchor="middle" class="d3-t d3-note"></text>
</svg>
