<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" style="max-width: 100%; height: auto;" role="img" aria-label="The handoff from UI thread to raster thread via FlutterView.render(scene)">
  <defs>
    <marker id="fp2-ho-arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--svg-dart-blue, #0175C2)"/>
    </marker>
    <marker id="fp2-ho-arrow-green" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--svg-green, #10b981)"/>
    </marker>
  </defs>
  <style>
    .fp2ho-title { font: bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .fp2ho-label { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .fp2ho-small { font: 10px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text-muted, #64748b); }
    .fp2ho-code { font: 600 10px "SF Mono", Menlo, Monaco, monospace; fill: var(--svg-text, #1e293b); }
  </style>

  <text x="360" y="28" text-anchor="middle" class="fp2ho-title">The UI → Raster Thread Handoff</text>

  <!-- UI Thread Side -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="310" height="230" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="2" rx="8"/>
    <text x="155" y="22" text-anchor="middle" class="fp2ho-label">UI Thread (Dart)</text>

    <!-- Layer Tree -->
    <rect x="20" y="40" width="130" height="50" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="6"/>
    <text x="85" y="60" text-anchor="middle" class="fp2ho-code">Layer Tree</text>
    <text x="85" y="75" text-anchor="middle" class="fp2ho-small">from flushPaint()</text>

    <!-- Arrow -->
    <line x1="155" y1="65" x2="175" y2="65" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" marker-end="url(#fp2-ho-arrow)"/>

    <!-- SceneBuilder -->
    <rect x="180" y="40" width="110" height="50" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="6"/>
    <text x="235" y="60" text-anchor="middle" class="fp2ho-code">SceneBuilder</text>
    <text x="235" y="75" text-anchor="middle" class="fp2ho-small">addToScene()</text>

    <!-- Arrow down -->
    <line x1="235" y1="95" x2="235" y2="115" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" marker-end="url(#fp2-ho-arrow)"/>

    <!-- Scene -->
    <rect x="160" y="120" width="130" height="45" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="2" rx="6"/>
    <text x="225" y="140" text-anchor="middle" class="fp2ho-code">Scene</text>
    <text x="225" y="155" text-anchor="middle" class="fp2ho-small">(native pointer)</text>

    <!-- Arrow down -->
    <line x1="225" y1="170" x2="225" y2="190" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1.5" marker-end="url(#fp2-ho-arrow)"/>

    <!-- render call -->
    <rect x="100" y="195" width="190" height="25" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="2" rx="4"/>
    <text x="195" y="212" text-anchor="middle" class="fp2ho-code">FlutterView.render(scene)</text>
  </g>

  <!-- The Boundary -->
  <g transform="translate(340, 50)">
    <rect x="0" y="0" width="40" height="230" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" stroke-width="2" rx="4"/>
    <text x="20" y="100" text-anchor="middle" transform="rotate(-90, 20, 100)" class="fp2ho-label" fill="var(--svg-red, #dc2626)">BOUNDARY</text>
    <text x="20" y="135" text-anchor="middle" transform="rotate(-90, 20, 135)" class="fp2ho-small" fill="var(--svg-red, #dc2626)">Last Dart code</text>
  </g>

  <!-- Arrow across boundary -->
  <g transform="translate(330, 157)">
    <line x1="0" y1="0" x2="70" y2="0" stroke="var(--svg-green, #10b981)" stroke-width="3" marker-end="url(#fp2-ho-arrow-green)"/>
  </g>

  <!-- Raster Thread Side -->
  <g transform="translate(390, 50)">
    <rect x="0" y="0" width="310" height="230" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="2" rx="8"/>
    <text x="155" y="22" text-anchor="middle" class="fp2ho-label">Raster Thread (C++ Engine)</text>

    <!-- LayerTree C++ -->
    <rect x="20" y="40" width="130" height="45" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="6"/>
    <text x="85" y="58" text-anchor="middle" class="fp2ho-code">LayerTree</text>
    <text x="85" y="72" text-anchor="middle" class="fp2ho-small">(C++ struct)</text>

    <!-- Arrow -->
    <line x1="155" y1="62" x2="175" y2="62" stroke="var(--svg-green, #10b981)" stroke-width="1.5" marker-end="url(#fp2-ho-arrow-green)"/>

    <!-- DisplayList -->
    <rect x="180" y="40" width="110" height="45" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="6"/>
    <text x="235" y="58" text-anchor="middle" class="fp2ho-code">DisplayList</text>
    <text x="235" y="72" text-anchor="middle" class="fp2ho-small">(Impeller format)</text>

    <!-- Arrow down -->
    <line x1="155" y1="95" x2="155" y2="115" stroke="var(--svg-green, #10b981)" stroke-width="1.5" marker-end="url(#fp2-ho-arrow-green)"/>

    <!-- GPU Commands -->
    <rect x="50" y="120" width="210" height="45" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="6"/>
    <text x="155" y="140" text-anchor="middle" class="fp2ho-code">GPU Command Buffers</text>
    <text x="155" y="155" text-anchor="middle" class="fp2ho-small">Metal (iOS) / Vulkan (Android)</text>

    <!-- Arrow down -->
    <line x1="155" y1="170" x2="155" y2="190" stroke="var(--svg-green, #10b981)" stroke-width="1.5" marker-end="url(#fp2-ho-arrow-green)"/>

    <!-- GPU -->
    <rect x="80" y="195" width="150" height="25" fill="var(--svg-purple-fill, #f3e8ff)" stroke="var(--svg-purple, #9333ea)" stroke-width="2" rx="4"/>
    <text x="155" y="212" text-anchor="middle" class="fp2ho-code">GPU Executes</text>
  </g>

  <!-- Key insight -->
  <g transform="translate(20, 295)">
    <rect x="0" y="0" width="680" height="35" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="6"/>
    <text x="340" y="14" text-anchor="middle" class="fp2ho-code">FlutterView.render(scene) is the seam.</text>
    <text x="340" y="28" text-anchor="middle" class="fp2ho-small">Before: Dart on UI thread. After: C++ on raster thread. No Dart runs after this point.</text>
  </g>
</svg>
