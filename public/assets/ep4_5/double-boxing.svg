<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Why doubles can't use the Smi trick">
  <defs>
    <marker id="ah-d45-1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/></marker>
  </defs>
  <style>
    .e1-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .e1-title { font-size: 17px; font-weight: 600; }
    .e1-sub { font-size: 14px; font-weight: 500; fill: #475569; }
    .e1-label { font-size: 12px; fill: #64748b; }
    .e1-mn { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 13px; }
    .e1-var { font-size: 18px; font-weight: 700; font-family: "SF Mono", Menlo, monospace; fill: #1e293b; }
    .e1-tag { font-size: 11px; font-weight: 700; fill: #ffffff; font-family: "SF Mono", Menlo, monospace; }
    .e1-good { font-size: 12px; fill: #059669; }
    .e1-bad { font-size: 12px; fill: #b45309; }
    .e1-note { font-size: 13px; fill: #475569; font-style: italic; }
  </style>

  <text x="360" y="30" text-anchor="middle" class="e1-t e1-title">int can be inline. double cannot.</text>

  <!-- ============ TOP: int as Smi ============ -->
  <text x="180" y="72" text-anchor="middle" class="e1-t e1-sub">int x = 42</text>

  <text x="40" y="140" class="e1-t e1-var">x</text>
  <line x1="60" y1="135" x2="92" y2="135" stroke="#1e293b" stroke-width="1.5" marker-end="url(#ah-d45-1)"/>

  <rect x="98" y="112" width="170" height="50" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="183" y="140" text-anchor="middle" class="e1-t e1-mn">value: 42</text>

  <rect x="268" y="112" width="35" height="50" fill="#10b981" rx="4"/>
  <text x="285" y="145" text-anchor="middle" class="e1-tag">0</text>

  <text x="180" y="195" text-anchor="middle" class="e1-t e1-good">✓ Smi — value lives in the pointer slot. Zero heap allocation.</text>

  <!-- Separator -->
  <line x1="360" y1="60" x2="360" y2="320" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ============ BOTTOM: double always boxed ============ -->
  <text x="540" y="72" text-anchor="middle" class="e1-t e1-sub">double x = 3.14</text>

  <text x="395" y="140" class="e1-t e1-var">x</text>
  <line x1="415" y1="135" x2="447" y2="135" stroke="#1e293b" stroke-width="1.5" marker-end="url(#ah-d45-1)"/>

  <rect x="452" y="112" width="135" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <text x="519" y="134" text-anchor="middle" class="e1-t e1-label">pointer</text>
  <text x="519" y="154" text-anchor="middle" class="e1-t e1-mn" font-size="11">0xA1B2…</text>

  <rect x="587" y="112" width="35" height="50" fill="#f59e0b" rx="4"/>
  <text x="604" y="145" text-anchor="middle" class="e1-tag">1</text>

  <line x1="519" y1="167" x2="519" y2="200" stroke="#1e293b" stroke-width="2" marker-end="url(#ah-d45-1)"/>

  <rect x="430" y="205" width="180" height="55" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <line x1="498" y1="205" x2="498" y2="260" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="464" y="226" text-anchor="middle" class="e1-t e1-label">header</text>
  <text x="464" y="248" text-anchor="middle" class="e1-t e1-label" font-size="10">+ GC tags</text>
  <text x="554" y="226" text-anchor="middle" class="e1-t e1-label">value</text>
  <text x="554" y="250" text-anchor="middle" class="e1-t e1-mn">8 bytes</text>

  <text x="540" y="290" text-anchor="middle" class="e1-t e1-bad">✗ Always boxed. All 64 bits are needed for the value —</text>
  <text x="540" y="307" text-anchor="middle" class="e1-t e1-bad">no spare bit for a Smi tag.</text>
</svg>
