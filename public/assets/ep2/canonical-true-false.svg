<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="Canonical true and false objects shared by variables">
  <defs>
    <marker id="ah-bool1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
  </defs>
  <style>
    .b1-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .b1-title { font-size: 16px; font-weight: 600; }
    .b1-obj { font-size: 15px; font-weight: 600; }
    .b1-mn { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 13px; }
    .b1-cap { font-size: 12px; fill: #475569; font-style: italic; }
    .b1-note { font-size: 13px; fill: #475569; }
  </style>

  <text x="360" y="28" text-anchor="middle" class="b1-t b1-title">Five variables, two shared objects</text>

  <!-- Canonical true -->
  <rect x="140" y="55" width="160" height="80" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="220" y="85" text-anchor="middle" class="b1-t b1-obj">canonical true</text>
  <text x="220" y="110" text-anchor="middle" class="b1-t b1-mn">value: true</text>
  <text x="220" y="155" text-anchor="middle" class="b1-t b1-cap">created once by Dart VM</text>

  <!-- Canonical false -->
  <rect x="420" y="55" width="160" height="80" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
  <text x="500" y="85" text-anchor="middle" class="b1-t b1-obj">canonical false</text>
  <text x="500" y="110" text-anchor="middle" class="b1-t b1-mn">value: false</text>
  <text x="500" y="155" text-anchor="middle" class="b1-t b1-cap">created once by Dart VM</text>

  <!-- Variables: true group -->
  <rect x="150" y="240" width="70" height="35" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="4"/>
  <text x="185" y="263" text-anchor="middle" class="b1-t b1-mn">jerry</text>

  <rect x="225" y="240" width="70" height="35" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="4"/>
  <text x="260" y="263" text-anchor="middle" class="b1-t b1-mn">bob</text>

  <!-- Variables: false group -->
  <rect x="395" y="240" width="70" height="35" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="4"/>
  <text x="430" y="263" text-anchor="middle" class="b1-t b1-mn">tom</text>

  <rect x="470" y="240" width="70" height="35" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="4"/>
  <text x="505" y="263" text-anchor="middle" class="b1-t b1-mn">alex</text>

  <rect x="545" y="240" width="70" height="35" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="4"/>
  <text x="580" y="263" text-anchor="middle" class="b1-t b1-mn">fox</text>

  <!-- Arrows to true -->
  <line x1="185" y1="240" x2="195" y2="138" stroke="#10b981" stroke-width="1.5" marker-end="url(#ah-bool1)"/>
  <line x1="260" y1="240" x2="245" y2="138" stroke="#10b981" stroke-width="1.5" marker-end="url(#ah-bool1)"/>

  <!-- Arrows to false -->
  <line x1="430" y1="240" x2="475" y2="138" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ah-bool1)"/>
  <line x1="505" y1="240" x2="505" y2="138" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ah-bool1)"/>
  <line x1="580" y1="240" x2="535" y2="138" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ah-bool1)"/>

  <!-- Caption -->
  <text x="360" y="310" text-anchor="middle" class="b1-t b1-note">Each variable holds a reference. The objects are shared.</text>
</svg>
