<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" role="img" aria-label="On the left every constructor call builds a separate object; on the right every call resolves to one shared instance" style="max-width: 100%; height: auto;"><style>.sng1-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.sng1-title{font-size:16px;font-weight:600}.sng1-bad{font-size:13px;font-weight:600;fill:#dc2626}.sng1-good{font-size:13px;font-weight:600;fill:#10b981}.sng1-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#475569}.sng1-label{font-size:11px;fill:#64748b}</style><text x="360" y="28" text-anchor="middle" class="sng1-t sng1-title">Three calls, three objects — or three calls, one object</text><rect x="30" y="50" width="320" height="258" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="76" text-anchor="middle" class="sng1-t sng1-bad">Plain constructor</text><rect x="50" y="92" width="80" height="34" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="90" y="114" text-anchor="middle" class="sng1-t sng1-mn">Logger()</text><rect x="150" y="92" width="80" height="34" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="190" y="114" text-anchor="middle" class="sng1-t sng1-mn">Logger()</text><rect x="250" y="92" width="80" height="34" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="290" y="114" text-anchor="middle" class="sng1-t sng1-mn">Logger()</text><line x1="90" y1="126" x2="90" y2="166" stroke="#fca5a5" stroke-width="1.5" marker-end="url(#sng1-r)"/><line x1="190" y1="126" x2="190" y2="166" stroke="#fca5a5" stroke-width="1.5" marker-end="url(#sng1-r)"/><line x1="290" y1="126" x2="290" y2="166" stroke="#fca5a5" stroke-width="1.5" marker-end="url(#sng1-r)"/><rect x="56" y="170" width="68" height="44" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="6"/><text x="90" y="197" text-anchor="middle" class="sng1-t sng1-mn">#a1b2</text><rect x="156" y="170" width="68" height="44" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="6"/><text x="190" y="197" text-anchor="middle" class="sng1-t sng1-mn">#c3d4</text><rect x="256" y="170" width="68" height="44" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="6"/><text x="290" y="197" text-anchor="middle" class="sng1-t sng1-mn">#e5f6</text><text x="190" y="250" text-anchor="middle" class="sng1-t sng1-label">Three separate objects on the heap.</text><text x="190" y="272" text-anchor="middle" class="sng1-t sng1-label">Three log buffers, three config copies.</text><text x="190" y="296" text-anchor="middle" class="sng1-t sng1-bad">identical(a, b) == false</text><rect x="370" y="50" width="320" height="258" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="76" text-anchor="middle" class="sng1-t sng1-good">Singleton</text><rect x="390" y="92" width="80" height="34" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="430" y="114" text-anchor="middle" class="sng1-t sng1-mn">Logger()</text><rect x="490" y="92" width="80" height="34" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="530" y="114" text-anchor="middle" class="sng1-t sng1-mn">Logger()</text><rect x="590" y="92" width="80" height="34" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="630" y="114" text-anchor="middle" class="sng1-t sng1-mn">Logger()</text><line x1="430" y1="126" x2="520" y2="186" stroke="#10b981" stroke-width="1.5" marker-end="url(#sng1-g)"/><line x1="530" y1="126" x2="530" y2="186" stroke="#10b981" stroke-width="1.5" marker-end="url(#sng1-g)"/><line x1="630" y1="126" x2="540" y2="186" stroke="#10b981" stroke-width="1.5" marker-end="url(#sng1-g)"/><rect x="466" y="190" width="128" height="46" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/><text x="530" y="211" text-anchor="middle" class="sng1-t sng1-mn">_instance</text><text x="530" y="228" text-anchor="middle" class="sng1-t sng1-mn">#a1b2</text><text x="530" y="266" text-anchor="middle" class="sng1-t sng1-label">Every call hands back the same object.</text><text x="530" y="288" text-anchor="middle" class="sng1-t sng1-label">One buffer, one config, shared.</text><text x="530" y="308" text-anchor="middle" class="sng1-t sng1-good">identical(a, b) == true</text><defs><marker id="sng1-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fca5a5"/></marker><marker id="sng1-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker></defs></svg>
