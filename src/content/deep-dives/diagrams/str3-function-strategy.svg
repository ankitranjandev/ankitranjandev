<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="The same sort call with three different comparator functions produces three different orderings: ascending, descending, and by length on any type" style="max-width: 100%; height: auto;"><style>.str3-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.str3-title{font-size:16px;font-weight:600}.str3-call{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:13px;fill:#475569}.str3-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#1e293b}.str3-tag{font-size:12px;font-weight:600;fill:#9333ea}.str3-out{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#065f46}</style><text x="360" y="26" text-anchor="middle" class="str3-t str3-title">Same call, swap the function, different order</text><text x="360" y="50" text-anchor="middle" class="str3-t str3-call">list.sort( strategy )</text><text x="346" y="80" text-anchor="middle" class="str3-t str3-tag">ascending</text><rect x="24" y="88" width="150" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" rx="6"/><text x="99" y="116" text-anchor="middle" class="str3-t str3-mn">[3, 1, 2]</text><line x1="174" y1="111" x2="204" y2="111" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#str3-a)"/><rect x="206" y="88" width="280" height="46" fill="#ede9fe" stroke="#9333ea" stroke-width="1.5" rx="6"/><text x="346" y="116" text-anchor="middle" class="str3-t str3-mn">(a, b) =&gt; a - b</text><line x1="486" y1="111" x2="516" y2="111" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#str3-a)"/><rect x="518" y="88" width="178" height="46" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="607" y="116" text-anchor="middle" class="str3-t str3-out">[1, 2, 3]</text><text x="346" y="158" text-anchor="middle" class="str3-t str3-tag">descending</text><rect x="24" y="166" width="150" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" rx="6"/><text x="99" y="194" text-anchor="middle" class="str3-t str3-mn">[3, 1, 2]</text><line x1="174" y1="189" x2="204" y2="189" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#str3-a)"/><rect x="206" y="166" width="280" height="46" fill="#ede9fe" stroke="#9333ea" stroke-width="1.5" rx="6"/><text x="346" y="194" text-anchor="middle" class="str3-t str3-mn">(a, b) =&gt; b - a</text><line x1="486" y1="189" x2="516" y2="189" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#str3-a)"/><rect x="518" y="166" width="178" height="46" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="607" y="194" text-anchor="middle" class="str3-t str3-out">[3, 2, 1]</text><text x="346" y="236" text-anchor="middle" class="str3-t str3-tag">by length — any type</text><rect x="24" y="244" width="150" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" rx="6"/><text x="99" y="272" text-anchor="middle" class="str3-t str3-mn">['bb','a','ccc']</text><line x1="174" y1="267" x2="204" y2="267" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#str3-a)"/><rect x="206" y="244" width="280" height="46" fill="#ede9fe" stroke="#9333ea" stroke-width="1.5" rx="6"/><text x="346" y="272" text-anchor="middle" class="str3-t str3-mn">(a, b) =&gt; a.length - b.length</text><line x1="486" y1="267" x2="516" y2="267" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#str3-a)"/><rect x="518" y="244" width="178" height="46" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="607" y="272" text-anchor="middle" class="str3-t str3-out">['a','bb','ccc']</text><defs><marker id="str3-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker></defs></svg>