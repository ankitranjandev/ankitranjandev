<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="Truth tables for NOT AND OR operators">
  <style>
    .b3-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .b3-title { font-size: 16px; font-weight: 600; }
    .b3-op { font-size: 17px; font-weight: 700; font-family: "SF Mono", Menlo, monospace; }
    .b3-hdr { font-size: 13px; font-weight: 600; font-family: "SF Mono", Menlo, monospace; fill: #64748b; }
    .b3-val { font-family: "SF Mono", Menlo, monospace; font-size: 14px; font-weight: 700; }
  </style>

  <text x="360" y="28" text-anchor="middle" class="b3-t b3-title">Truth tables for the core logical operators</text>

  <!-- ============ NOT ============ -->
  <text x="120" y="68" text-anchor="middle" class="b3-t b3-op">! (NOT)</text>

  <text x="80" y="100" text-anchor="middle" class="b3-t b3-hdr">A</text>
  <text x="160" y="100" text-anchor="middle" class="b3-t b3-hdr">!A</text>
  <line x1="40" y1="110" x2="200" y2="110" stroke="#cbd5e1" stroke-width="1"/>

  <rect x="55" y="125" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="80" y="148" text-anchor="middle" class="b3-t b3-val">T</text>
  <rect x="135" y="125" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="160" y="148" text-anchor="middle" class="b3-t b3-val">F</text>

  <rect x="55" y="170" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="80" y="193" text-anchor="middle" class="b3-t b3-val">F</text>
  <rect x="135" y="170" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="160" y="193" text-anchor="middle" class="b3-t b3-val">T</text>

  <!-- ============ AND ============ -->
  <text x="360" y="68" text-anchor="middle" class="b3-t b3-op">&amp;&amp; (AND)</text>

  <text x="290" y="100" text-anchor="middle" class="b3-t b3-hdr">A</text>
  <text x="360" y="100" text-anchor="middle" class="b3-t b3-hdr">B</text>
  <text x="430" y="100" text-anchor="middle" class="b3-t b3-hdr">A &amp;&amp; B</text>
  <line x1="260" y1="110" x2="470" y2="110" stroke="#cbd5e1" stroke-width="1"/>

  <rect x="265" y="125" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="290" y="148" text-anchor="middle" class="b3-t b3-val">T</text>
  <rect x="335" y="125" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="360" y="148" text-anchor="middle" class="b3-t b3-val">T</text>
  <rect x="405" y="125" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="430" y="148" text-anchor="middle" class="b3-t b3-val">T</text>

  <rect x="265" y="165" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="290" y="188" text-anchor="middle" class="b3-t b3-val">T</text>
  <rect x="335" y="165" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="360" y="188" text-anchor="middle" class="b3-t b3-val">F</text>
  <rect x="405" y="165" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="430" y="188" text-anchor="middle" class="b3-t b3-val">F</text>

  <rect x="265" y="205" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="290" y="228" text-anchor="middle" class="b3-t b3-val">F</text>
  <rect x="335" y="205" width="50" height="35" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="360" y="228" text-anchor="middle" class="b3-t b3-val">T</text>
  <rect x="405" y="205" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="430" y="228" text-anchor="middle" class="b3-t b3-val">F</text>

  <rect x="265" y="245" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="290" y="268" text-anchor="middle" class="b3-t b3-val">F</text>
  <rect x="335" y="245" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="360" y="268" text-anchor="middle" class="b3-t b3-val">F</text>
  <rect x="405" y="245" width="50" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="430" y="268" text-anchor="middle" class="b3-t b3-val">F</text>

  <!-- ============ OR ============ -->
