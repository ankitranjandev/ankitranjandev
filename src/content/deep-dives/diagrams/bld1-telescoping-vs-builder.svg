<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 350" role="img" aria-label="A telescoping constructor with many positional arguments that is easy to misorder, versus a builder that assembles the same object one named step at a time" style="max-width: 100%; height: auto;"><style>.bld1-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.bld1-title{font-size:16px;font-weight:600}.bld1-bad{font-size:13px;font-weight:600;fill:#dc2626}.bld1-good{font-size:13px;font-weight:600;fill:#10b981}.bld1-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#475569}.bld1-cap{font-size:11px;fill:#64748b}</style><text x="360" y="30" text-anchor="middle" class="bld1-t bld1-title">One giant call, or one step at a time</text><rect x="30" y="52" width="320" height="266" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="78" text-anchor="middle" class="bld1-t bld1-bad">Telescoping constructor</text><rect x="54" y="94" width="272" height="150" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" rx="6"/><text x="70" y="118" class="bld1-t bld1-mn">Burger(</text><text x="82" y="138" class="bld1-t bld1-mn">true, false, true, 2,</text><text x="82" y="158" class="bld1-t bld1-mn">false, true, 'large',</text><text x="82" y="178" class="bld1-t bld1-mn">null, true, false,</text><text x="82" y="198" class="bld1-t bld1-mn">// which flag was which?</text><text x="70" y="218" class="bld1-t bld1-mn">);</text><text x="190" y="276" text-anchor="middle" class="bld1-t bld1-cap">Swap two booleans and it still compiles.</text><text x="190" y="296" text-anchor="middle" class="bld1-t bld1-cap">Every new option grows the call.</text><rect x="370" y="52" width="320" height="266" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="78" text-anchor="middle" class="bld1-t bld1-good">Builder, step by step</text><rect x="394" y="94" width="232" height="38" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="6"/><text x="510" y="118" text-anchor="middle" class="bld1-t bld1-mn">b.addPatty()</text><rect x="394" y="140" width="232" height="38" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="6"/><text x="510" y="164" text-anchor="middle" class="bld1-t bld1-mn">b.addCheese()</text><rect x="394" y="186" width="232" height="38" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="6"/><text x="510" y="210" text-anchor="middle" class="bld1-t bld1-mn">b.size('large')</text><line x1="510" y1="224" x2="510" y2="244" stroke="#10b981" stroke-width="2" marker-end="url(#bld1-a)"/><rect x="424" y="250" width="172" height="38" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/><text x="510" y="274" text-anchor="middle" class="bld1-t bld1-mn">b.build()</text><text x="530" y="308" text-anchor="middle" class="bld1-t bld1-cap">Each step is named. Order is yours to set.</text><defs><marker id="bld1-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker></defs></svg>
