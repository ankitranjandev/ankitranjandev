<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" style="max-width: 100%; height: auto;" role="img" aria-label="Flutter layer tree structure: ContainerLayer containing various layer types">
  <style>
    .fp2lt-title { font: bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .fp2lt-label { font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .fp2lt-small { font: 10px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text-muted, #64748b); }
    .fp2lt-code { font: 600 9px "SF Mono", Menlo, Monaco, monospace; fill: var(--svg-text, #1e293b); }
  </style>

  <text x="360" y="28" text-anchor="middle" class="fp2lt-title">The Layer Tree</text>

  <!-- Root: TransformLayer (RenderView) -->
  <g transform="translate(280, 50)">
    <rect x="0" y="0" width="160" height="45" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="2" rx="6"/>
    <text x="80" y="18" text-anchor="middle" class="fp2lt-label">TransformLayer</text>
    <text x="80" y="32" text-anchor="middle" class="fp2lt-small">(RenderView root)</text>
    <text x="80" y="42" text-anchor="middle" class="fp2lt-code">device pixel ratio</text>
  </g>

  <!-- Lines down to children -->
  <line x1="360" y1="95" x2="360" y2="110" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>
  <line x1="180" y1="110" x2="540" y2="110" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>
  <line x1="180" y1="110" x2="180" y2="125" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>
  <line x1="360" y1="110" x2="360" y2="125" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>
  <line x1="540" y1="110" x2="540" y2="125" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>

  <!-- OffsetLayer (RepaintBoundary) -->
  <g transform="translate(100, 125)">
    <rect x="0" y="0" width="160" height="55" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="2" rx="6"/>
    <text x="80" y="18" text-anchor="middle" class="fp2lt-label">OffsetLayer</text>
    <text x="80" y="32" text-anchor="middle" class="fp2lt-small">(RepaintBoundary)</text>
    <text x="80" y="48" text-anchor="middle" class="fp2lt-code">Isolated repaint zone</text>
  </g>

  <!-- OpacityLayer -->
  <g transform="translate(280, 125)">
    <rect x="0" y="0" width="160" height="55" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="2" rx="6"/>
    <text x="80" y="18" text-anchor="middle" class="fp2lt-label">OpacityLayer</text>
    <text x="80" y="32" text-anchor="middle" class="fp2lt-small">(Opacity widget)</text>
    <text x="80" y="48" text-anchor="middle" class="fp2lt-code">alpha: 0.5</text>
  </g>

  <!-- ClipRectLayer -->
  <g transform="translate(460, 125)">
    <rect x="0" y="0" width="160" height="55" fill="var(--svg-purple-fill, #f3e8ff)" stroke="var(--svg-purple, #9333ea)" stroke-width="2" rx="6"/>
    <text x="80" y="18" text-anchor="middle" class="fp2lt-label">ClipRectLayer</text>
    <text x="80" y="32" text-anchor="middle" class="fp2lt-small">(ClipRect widget)</text>
    <text x="80" y="48" text-anchor="middle" class="fp2lt-code">rect: 0,0,200,200</text>
  </g>

  <!-- Lines to PictureLayers -->
  <line x1="180" y1="180" x2="180" y2="210" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>
  <line x1="360" y1="180" x2="360" y2="210" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>
  <line x1="540" y1="180" x2="540" y2="210" stroke="var(--svg-text-secondary, #475569)" stroke-width="1.5"/>

  <!-- PictureLayer 1 -->
  <g transform="translate(100, 210)">
    <rect x="0" y="0" width="160" height="50" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="2" rx="6"/>
    <text x="80" y="18" text-anchor="middle" class="fp2lt-label">PictureLayer</text>
    <text x="80" y="35" text-anchor="middle" class="fp2lt-small">Picture (cached draws)</text>
  </g>

  <!-- PictureLayer 2 -->
  <g transform="translate(280, 210)">
    <rect x="0" y="0" width="160" height="50" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="2" rx="6"/>
    <text x="80" y="18" text-anchor="middle" class="fp2lt-label">PictureLayer</text>
    <text x="80" y="35" text-anchor="middle" class="fp2lt-small">Picture (cached draws)</text>
  </g>

  <!-- PictureLayer 3 -->
  <g transform="translate(460, 210)">
    <rect x="0" y="0" width="160" height="50" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="2" rx="6"/>
    <text x="80" y="18" text-anchor="middle" class="fp2lt-label">PictureLayer</text>
    <text x="80" y="35" text-anchor="middle" class="fp2lt-small">Picture (cached draws)</text>
  </g>

  <!-- Layer types legend -->
  <g transform="translate(30, 290)">
    <rect x="0" y="0" width="660" height="115" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="8"/>
    <text x="330" y="20" text-anchor="middle" class="fp2lt-label">Layer Types</text>

    <rect x="20" y="35" width="140" height="32" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>
    <text x="90" y="48" text-anchor="middle" class="fp2lt-code">PictureLayer</text>
    <text x="90" y="60" text-anchor="middle" class="fp2lt-small">Holds a Picture</text>

    <rect x="175" y="35" width="140" height="32" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="1" rx="4"/>
    <text x="245" y="48" text-anchor="middle" class="fp2lt-code">TransformLayer</text>
    <text x="245" y="60" text-anchor="middle" class="fp2lt-small">Matrix transform</text>

    <rect x="330" y="35" width="140" height="32" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="1" rx="4"/>
    <text x="400" y="48" text-anchor="middle" class="fp2lt-code">OpacityLayer</text>
    <text x="400" y="60" text-anchor="middle" class="fp2lt-small">Uses saveLayer!</text>

    <rect x="485" y="35" width="155" height="32" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="1" rx="4"/>
    <text x="563" y="48" text-anchor="middle" class="fp2lt-code">OffsetLayer</text>
    <text x="563" y="60" text-anchor="middle" class="fp2lt-small">RepaintBoundary</text>

    <rect x="20" y="75" width="140" height="32" fill="var(--svg-purple-fill, #f3e8ff)" stroke="var(--svg-purple, #9333ea)" stroke-width="1" rx="4"/>
    <text x="90" y="88" text-anchor="middle" class="fp2lt-code">ClipRectLayer</text>
    <text x="90" y="100" text-anchor="middle" class="fp2lt-small">Rectangular clip</text>

    <rect x="175" y="75" width="140" height="32" fill="var(--svg-purple-fill, #f3e8ff)" stroke="var(--svg-purple, #9333ea)" stroke-width="1" rx="4"/>
    <text x="245" y="88" text-anchor="middle" class="fp2lt-code">ClipPathLayer</text>
    <text x="245" y="100" text-anchor="middle" class="fp2lt-small">Arbitrary path clip</text>

    <rect x="330" y="75" width="140" height="32" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" stroke-width="1" rx="4"/>
    <text x="400" y="88" text-anchor="middle" class="fp2lt-code">BackdropFilter</text>
    <text x="400" y="100" text-anchor="middle" class="fp2lt-small">Expensive blur!</text>

    <rect x="485" y="75" width="155" height="32" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1" rx="4"/>
    <text x="563" y="88" text-anchor="middle" class="fp2lt-code">ContainerLayer</text>
    <text x="563" y="100" text-anchor="middle" class="fp2lt-small">Groups children</text>
  </g>
</svg>
