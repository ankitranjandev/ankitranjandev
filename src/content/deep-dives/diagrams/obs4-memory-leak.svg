<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 336" role="img" aria-label="The observer memory leak: a subject's listener list keeps a removed widget alive so the garbage collector cannot free it, until removeListener in dispose cuts the reference" style="max-width: 100%; height: auto;"><style>.ob4-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.ob4-title{font-size:16px;font-weight:600}.ob4-h{font-size:14px;font-weight:600}.ob4-bad{font-size:13px;font-weight:600;fill:#dc2626}.ob4-good{font-size:13px;font-weight:600;fill:#10b981}.ob4-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#475569}.ob4-label{font-size:12px;fill:#64748b}</style><text x="360" y="28" text-anchor="middle" class="ob4-t ob4-title">The subject keeps your widget alive</text><rect x="30" y="50" width="320" height="262" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="76" text-anchor="middle" class="ob4-t ob4-bad">Forgot to remove</text><rect x="100" y="92" width="180" height="48" fill="#f3e8ff" stroke="#9333ea" stroke-width="2" rx="6"/><text x="190" y="112" text-anchor="middle" class="ob4-t ob4-h">Subject</text><text x="190" y="130" text-anchor="middle" class="ob4-t ob4-mn">_observers: [State]</text><line x1="190" y1="140" x2="190" y2="196" stroke="#dc2626" stroke-width="2" marker-end="url(#ob4-r)"/><text x="278" y="172" text-anchor="middle" class="ob4-t ob4-label">still holds</text><rect x="100" y="198" width="180" height="62" fill="#ffffff" stroke="#dc2626" stroke-width="2" stroke-dasharray="5 3" rx="6"/><text x="190" y="222" text-anchor="middle" class="ob4-t ob4-h">State object</text><text x="190" y="240" text-anchor="middle" class="ob4-t ob4-label">gone from the tree</text><text x="190" y="290" text-anchor="middle" class="ob4-t ob4-bad">GC can't free it</text><rect x="370" y="50" width="320" height="262" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="76" text-anchor="middle" class="ob4-t ob4-good">dispose() removes it</text><rect x="440" y="92" width="180" height="48" fill="#f3e8ff" stroke="#9333ea" stroke-width="2" rx="6"/><text x="530" y="112" text-anchor="middle" class="ob4-t ob4-h">Subject</text><text x="530" y="130" text-anchor="middle" class="ob4-t ob4-mn">_observers: [ ]</text><line x1="530" y1="140" x2="530" y2="196" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4"/><line x1="512" y1="160" x2="548" y2="176" stroke="#dc2626" stroke-width="2.5"/><line x1="548" y1="160" x2="512" y2="176" stroke="#dc2626" stroke-width="2.5"/><text x="618" y="172" text-anchor="middle" class="ob4-t ob4-mn">removeListener</text><rect x="440" y="198" width="180" height="62" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/><text x="530" y="222" text-anchor="middle" class="ob4-t ob4-h">State object</text><text x="530" y="240" text-anchor="middle" class="ob4-t ob4-label">no references left</text><text x="530" y="290" text-anchor="middle" class="ob4-t ob4-good">GC reclaims it</text><defs><marker id="ob4-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/></marker></defs></svg>