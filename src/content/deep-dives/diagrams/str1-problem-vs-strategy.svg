<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" role="img" aria-label="A growing if-else chain versus a strategy slot: the left side adds a branch for every new payment method, the right side plugs interchangeable strategy objects into one call" style="max-width: 100%; height: auto;"><style>.str1-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.str1-title{font-size:16px;font-weight:600}.str1-bad{font-size:13px;font-weight:600;fill:#dc2626}.str1-good{font-size:13px;font-weight:600;fill:#10b981}.str1-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#475569}.str1-h{font-size:13px;font-weight:600}.str1-label{font-size:11px;fill:#64748b}</style><text x="360" y="30" text-anchor="middle" class="str1-t str1-title">A switch that grows forever, or a slot you plug into</text><rect x="30" y="52" width="320" height="252" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="78" text-anchor="middle" class="str1-t str1-bad">Without strategy</text><rect x="54" y="94" width="272" height="158" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" rx="6"/><text x="70" y="118" class="str1-t str1-mn">checkout(method) {</text><text x="82" y="140" class="str1-t str1-mn">if (method == card) {...}</text><text x="82" y="162" class="str1-t str1-mn">else if (paypal) {...}</text><text x="82" y="184" class="str1-t str1-mn">else if (upi) {...}</text><text x="82" y="206" class="str1-t str1-mn">else if (applePay) {...}</text><text x="82" y="228" class="str1-t str1-mn">// +1 branch every time</text><text x="70" y="248" class="str1-t str1-mn">}</text><text x="190" y="284" text-anchor="middle" class="str1-t str1-label">One method does every job. It only grows.</text><rect x="370" y="52" width="320" height="252" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="78" text-anchor="middle" class="str1-t str1-good">With strategy</text><rect x="430" y="96" width="200" height="48" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="6"/><text x="530" y="116" text-anchor="middle" class="str1-t str1-h">Checkout</text><text x="530" y="134" text-anchor="middle" class="str1-t str1-mn">strategy.pay()</text><line x1="530" y1="144" x2="530" y2="176" stroke="#9333ea" stroke-width="2" marker-end="url(#str1-a)"/><text x="592" y="166" text-anchor="middle" class="str1-t str1-label">plug in</text><rect x="392" y="180" width="86" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="435" y="205" text-anchor="middle" class="str1-t str1-mn">Card</text><rect x="487" y="180" width="86" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="530" y="205" text-anchor="middle" class="str1-t str1-mn">PayPal</text><rect x="582" y="180" width="86" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="625" y="205" text-anchor="middle" class="str1-t str1-mn">UPI</text><rect x="439" y="234" width="182" height="40" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3" rx="6"/><text x="530" y="259" text-anchor="middle" class="str1-t str1-mn">+ ApplePay</text><text x="530" y="293" text-anchor="middle" class="str1-t str1-label">New way? Write a class. Checkout never changes.</text><defs><marker id="str1-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker></defs></svg>