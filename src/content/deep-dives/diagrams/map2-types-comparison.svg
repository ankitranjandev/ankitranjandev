<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Map types comparison in Dart" style="max-width: 100%; height: auto;">
  <style>
    .m2-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:var(--svg-text, #1e293b)}
    .m2-title{font-size:16px;font-weight:600}
    .m2-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px}
    .m2-label{font-size:11px;fill:var(--svg-text-muted, #64748b)}
    .m2-head{font-size:12px;font-weight:600}
    .m2-desc{font-size:10px;fill:var(--svg-text-secondary, #475569)}
  </style>

  <text x="360" y="26" text-anchor="middle" class="m2-t m2-title">Dart Map Types — Choosing the Right Implementation</text>

  <!-- Table header -->
  <rect x="40" y="50" width="140" height="40" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="6" ry="0"/>
  <rect x="180" y="50" width="130" height="40" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5"/>
  <rect x="310" y="50" width="100" height="40" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5"/>
  <rect x="410" y="50" width="150" height="40" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5"/>
  <rect x="560" y="50" width="120" height="40" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1.5" rx="6" ry="0"/>

  <text x="110" y="75" text-anchor="middle" class="m2-t m2-head">Type</text>
  <text x="245" y="75" text-anchor="middle" class="m2-t m2-head">Order</text>
  <text x="360" y="75" text-anchor="middle" class="m2-t m2-head">Lookup</text>
  <text x="485" y="75" text-anchor="middle" class="m2-t m2-head">Best For</text>
  <text x="620" y="75" text-anchor="middle" class="m2-t m2-head">Create</text>

  <!-- Row 1: LinkedHashMap (default) -->
  <rect x="40" y="90" width="140" height="55" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="2"/>
  <rect x="180" y="90" width="130" height="55" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="310" y="90" width="100" height="55" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="410" y="90" width="150" height="55" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="560" y="90" width="120" height="55" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>

  <text x="110" y="112" text-anchor="middle" class="m2-t m2-mn" font-weight="600">LinkedHashMap</text>
  <text x="110" y="130" text-anchor="middle" class="m2-t m2-desc" fill="var(--svg-green, #10b981)">(default)</text>
  <text x="245" y="118" text-anchor="middle" class="m2-t m2-mn">Insertion order</text>
  <text x="360" y="118" text-anchor="middle" class="m2-t m2-mn" fill="var(--svg-green, #10b981)">O(1)</text>
  <text x="485" y="112" text-anchor="middle" class="m2-t m2-desc">General purpose,</text>
  <text x="485" y="128" text-anchor="middle" class="m2-t m2-desc">JSON, configs</text>
  <text x="620" y="118" text-anchor="middle" class="m2-t m2-mn">{k: v}</text>

  <!-- Row 2: HashMap -->
  <rect x="40" y="145" width="140" height="55" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="2"/>
  <rect x="180" y="145" width="130" height="55" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="310" y="145" width="100" height="55" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="410" y="145" width="150" height="55" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="560" y="145" width="120" height="55" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>

  <text x="110" y="167" text-anchor="middle" class="m2-t m2-mn" font-weight="600">HashMap</text>
  <text x="110" y="185" text-anchor="middle" class="m2-t m2-desc">(dart:collection)</text>
  <text x="245" y="173" text-anchor="middle" class="m2-t m2-mn">Unordered</text>
  <text x="360" y="173" text-anchor="middle" class="m2-t m2-mn" fill="var(--svg-green, #10b981)">O(1)</text>
  <text x="485" y="167" text-anchor="middle" class="m2-t m2-desc">Slightly less memory</text>
  <text x="485" y="183" text-anchor="middle" class="m2-t m2-desc">when order irrelevant</text>
  <text x="620" y="173" text-anchor="middle" class="m2-t m2-mn">HashMap()</text>

  <!-- Row 3: SplayTreeMap -->
  <rect x="40" y="200" width="140" height="55" fill="var(--svg-purple-fill, #e9d5ff)" stroke="var(--svg-purple, #9333ea)" stroke-width="2"/>
  <rect x="180" y="200" width="130" height="55" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="310" y="200" width="100" height="55" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="410" y="200" width="150" height="55" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="560" y="200" width="120" height="55" fill="var(--svg-bg, #f8fafc)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>

  <text x="110" y="222" text-anchor="middle" class="m2-t m2-mn" font-weight="600">SplayTreeMap</text>
  <text x="110" y="240" text-anchor="middle" class="m2-t m2-desc">(dart:collection)</text>
  <text x="245" y="228" text-anchor="middle" class="m2-t m2-mn">Sorted by key</text>
  <text x="360" y="228" text-anchor="middle" class="m2-t m2-mn" fill="var(--svg-amber, #f59e0b)">O(log n)</text>
  <text x="485" y="222" text-anchor="middle" class="m2-t m2-desc">Sorted iteration,</text>
  <text x="485" y="238" text-anchor="middle" class="m2-t m2-desc">range queries</text>
  <text x="620" y="228" text-anchor="middle" class="m2-t m2-mn">SplayTreeMap()</text>

  <!-- Row 4: Unmodifiable -->
  <rect x="40" y="255" width="140" height="55" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" stroke-width="2"/>
  <rect x="180" y="255" width="130" height="55" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="310" y="255" width="100" height="55" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="410" y="255" width="150" height="55" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>
  <rect x="560" y="255" width="120" height="55" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>

  <text x="110" y="277" text-anchor="middle" class="m2-t m2-mn" font-weight="600">Unmodifiable</text>
  <text x="110" y="295" text-anchor="middle" class="m2-t m2-desc">(wrapper)</text>
  <text x="245" y="283" text-anchor="middle" class="m2-t m2-mn">Preserves base</text>
  <text x="360" y="283" text-anchor="middle" class="m2-t m2-mn">Same as base</text>
  <text x="485" y="277" text-anchor="middle" class="m2-t m2-desc">Safe API returns,</text>
  <text x="485" y="293" text-anchor="middle" class="m2-t m2-desc">defensive copies</text>
  <text x="620" y="277" text-anchor="middle" class="m2-t m2-mn" font-size="10">Map.unmodifiable</text>
  <text x="620" y="293" text-anchor="middle" class="m2-t m2-mn" font-size="10">(map)</text>

  <!-- Key insight -->
  <rect x="120" y="325" width="480" height="25" rx="6" fill="none" stroke="var(--svg-border, #cbd5e1)" stroke-dasharray="4,2"/>
  <text x="360" y="342" text-anchor="middle" class="m2-t m2-label">Like Set, Dart's default Map is LinkedHashMap — it maintains insertion order!</text>
</svg>
