<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Smi vs normal pointer comparison">
  <defs>
    <marker id="arrowhead-1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .title { font-size: 16px; font-weight: 600; }
    .label { font-size: 12px; fill: #64748b; }
    .mono { font-family: "SF Mono", Menlo, Monaco, "Courier New", monospace; font-size: 14px; }
    .tag-text { font-size: 11px; font-weight: 700; fill: #ffffff; font-family: "SF Mono", Menlo, monospace; }
    .caption { font-size: 13px; fill: #475569; }
    .key-caption { font-size: 14px; font-weight: 600; fill: #047857; }
  </style>

  <!-- Row 1: Normal pointer -->
  <text x="20" y="30" class="title">Normal pointer (object reference)</text>

  <rect x="20" y="55" width="360" height="50" fill="#dbeafe" stroke="#0175C2" stroke-width="2" rx="4"/>
  <text x="200" y="78" text-anchor="middle" class="label">63 bits — heap address</text>
  <text x="200" y="98" text-anchor="middle" class="mono">0x7FF8AB3D…</text>

  <rect x="380" y="55" width="40" height="50" fill="#0175C2" rx="4"/>
  <text x="400" y="80" text-anchor="middle" class="tag-text">tag</text>
  <text x="400" y="96" text-anchor="middle" class="tag-text">1</text>

  <line x1="425" y1="80" x2="478" y2="80" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead-1)"/>

  <rect x="485" y="55" width="170" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <line x1="555" y1="55" x2="555" y2="105" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="520" y="78" text-anchor="middle" class="label">header</text>
  <text x="605" y="78" text-anchor="middle" class="label">value</text>
  <text x="605" y="98" text-anchor="middle" class="mono">42</text>
  <text x="570" y="130" text-anchor="middle" class="caption">heap object</text>

  <!-- Row 2: Smi pointer -->
  <text x="20" y="190" class="title">Smi pointer (small integer)</text>

  <rect x="20" y="215" width="360" height="50" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="200" y="238" text-anchor="middle" class="label">63 bits — the value itself</text>
  <text x="200" y="258" text-anchor="middle" class="mono">42 (encoded inline)</text>

  <rect x="380" y="215" width="40" height="50" fill="#10b981" rx="4"/>
  <text x="400" y="240" text-anchor="middle" class="tag-text">tag</text>
  <text x="400" y="256" text-anchor="middle" class="tag-text">0</text>

  <text x="220" y="310" text-anchor="middle" class="key-caption">The value IS the pointer.</text>
  <text x="220" y="332" text-anchor="middle" class="caption">No heap allocation. No indirection.</text>
</svg>
