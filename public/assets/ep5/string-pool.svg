<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-label="String constant pool with interned and non-interned strings">
  <defs>
    <marker id="ah-s1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--svg-text-secondary, #475569)"/></marker>
    <marker id="ah-s1-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--svg-dart-blue, #0175C2)"/></marker>
    <marker id="ah-s1-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--svg-amber, #f59e0b)"/></marker>
  </defs>
  <style>
    .s1-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: var(--svg-text, #1e293b); }
    .s1-title { font-size: 16px; font-weight: 600; }
    .s1-pool-label { font-size: 13px; font-weight: 600; fill: var(--svg-text-secondary, #475569); }
    .s1-obj { font-size: 14px; font-weight: 600; }
    .s1-mn { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 13px; }
    .s1-mn-small { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 11px; }
    .s1-cap { font-size: 12px; fill: var(--svg-text-secondary, #475569); font-style: italic; }
    .s1-note { font-size: 12px; fill: var(--svg-text-secondary, #475569); }
    .s1-bad { font-size: 12px; font-weight: 600; fill: var(--svg-amber, #b45309); }
    .s1-pool-box { fill: var(--svg-bg, #f8fafc); stroke: var(--svg-border-medium, #94a3b8); }
    .s1-blue-box { fill: var(--svg-dart-blue-fill, #dbeafe); stroke: var(--svg-dart-blue, #0175C2); }
    .s1-amber-box { fill: var(--svg-amber-fill, #fef3c7); stroke: var(--svg-amber, #f59e0b); }
    .s1-var-box { fill: var(--svg-bg-secondary, #ffffff); stroke: var(--svg-border-medium, #94a3b8); }
    .s1-blue-arrow { stroke: var(--svg-dart-blue, #0175C2); }
    .s1-amber-arrow { stroke: var(--svg-amber, #f59e0b); }
  </style>

  <text x="360" y="28" text-anchor="middle" class="s1-t s1-title">The string constant pool</text>

  <!-- Pool container -->
  <rect x="40" y="55" width="500" height="100" class="s1-pool-box" stroke-width="1.5" stroke-dasharray="4 4" rx="6"/>
  <text x="60" y="78" class="s1-t s1-pool-label">String pool (interned literals)</text>

  <!-- Interned strings inside pool -->
  <rect x="80" y="95" width="120" height="45" class="s1-blue-box" stroke-width="2" rx="4"/>
  <text x="140" y="115" text-anchor="middle" class="s1-t s1-mn">"Hello"</text>
  <text x="140" y="132" text-anchor="middle" class="s1-t s1-mn-small">(interned)</text>

  <rect x="220" y="95" width="120" height="45" class="s1-blue-box" stroke-width="2" rx="4"/>
  <text x="280" y="115" text-anchor="middle" class="s1-t s1-mn">"Dart"</text>
  <text x="280" y="132" text-anchor="middle" class="s1-t s1-mn-small">(interned)</text>

  <rect x="360" y="95" width="120" height="45" class="s1-blue-box" stroke-width="2" rx="4"/>
  <text x="420" y="115" text-anchor="middle" class="s1-t s1-mn">"World"</text>
  <text x="420" y="132" text-anchor="middle" class="s1-t s1-mn-small">(interned)</text>

  <!-- Outside-pool: runtime concatenation -->
  <rect x="560" y="95" width="130" height="45" class="s1-amber-box" stroke-width="2" rx="4"/>
  <text x="625" y="115" text-anchor="middle" class="s1-t s1-mn">"Hello Dart"</text>
  <text x="625" y="132" text-anchor="middle" class="s1-t s1-mn-small">(runtime, separate)</text>

  <!-- Variables (bottom row) -->
  <rect x="60" y="270" width="80" height="35" class="s1-var-box" stroke-width="1.5" rx="4"/>
  <text x="100" y="292" text-anchor="middle" class="s1-t s1-mn">str1</text>

  <rect x="150" y="270" width="80" height="35" class="s1-var-box" stroke-width="1.5" rx="4"/>
  <text x="190" y="292" text-anchor="middle" class="s1-t s1-mn">str2</text>

  <rect x="240" y="270" width="80" height="35" class="s1-var-box" stroke-width="1.5" rx="4"/>
  <text x="280" y="292" text-anchor="middle" class="s1-t s1-mn">lang</text>

  <rect x="330" y="270" width="80" height="35" class="s1-var-box" stroke-width="1.5" rx="4"/>
  <text x="370" y="292" text-anchor="middle" class="s1-t s1-mn">place</text>

  <rect x="540" y="270" width="150" height="35" class="s1-var-box" stroke-width="1.5" rx="4"/>
  <text x="615" y="292" text-anchor="middle" class="s1-t s1-mn">runtimeStr</text>

  <!-- Arrows to pool -->
  <line x1="100" y1="270" x2="135" y2="142" class="s1-blue-arrow" stroke-width="1.5" marker-end="url(#ah-s1-blue)"/>
  <line x1="190" y1="270" x2="145" y2="142" class="s1-blue-arrow" stroke-width="1.5" marker-end="url(#ah-s1-blue)"/>
  <line x1="280" y1="270" x2="280" y2="142" class="s1-blue-arrow" stroke-width="1.5" marker-end="url(#ah-s1-blue)"/>
  <line x1="370" y1="270" x2="420" y2="142" class="s1-blue-arrow" stroke-width="1.5" marker-end="url(#ah-s1-blue)"/>
  <line x1="615" y1="270" x2="625" y2="142" class="s1-amber-arrow" stroke-width="1.5" marker-end="url(#ah-s1-amber)"/>

  <!-- Captions -->
  <text x="40" y="335" class="s1-t s1-cap">str1 and str2 are identical — same shared object</text>
  <text x="700" y="335" text-anchor="end" class="s1-t s1-bad">runtime "+" creates a separate object</text>

  <text x="360" y="365" text-anchor="middle" class="s1-t s1-note">String literals are canonicalised. Runtime concatenation may not be.</text>
</svg>
