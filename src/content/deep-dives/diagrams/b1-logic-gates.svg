<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" style="max-width: 100%; height: auto;" role="img" aria-label="Three fundamental logic gates: AND, OR, and NOT with their truth tables">
  <style>
    .b1g-title { font: bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .b1g-gate { font: bold 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .b1g-label { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #475569; }
    .b1g-small { font: 11px "SF Mono", Menlo, Monaco, monospace; fill: #64748b; }
    .b1g-one { font: bold 12px "SF Mono", Menlo, Monaco, monospace; fill: #10b981; }
    .b1g-zero { font: bold 12px "SF Mono", Menlo, Monaco, monospace; fill: #dc2626; }
    .b1g-box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
    .b1g-shape { fill: #dbeafe; stroke: #0175C2; stroke-width: 2; }
  </style>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" class="b1g-title">Logic Gates — Built from Transistors</text>

  <!-- AND Gate -->
  <g transform="translate(20, 55)">
    <rect x="0" y="0" width="210" height="260" class="b1g-box"/>
    <text x="105" y="28" text-anchor="middle" class="b1g-gate">AND Gate</text>

    <!-- Gate symbol -->
    <path d="M40,60 L40,120 L80,120 Q120,90 80,60 Z" class="b1g-shape"/>
    <line x1="20" y1="75" x2="40" y2="75" stroke="#475569" stroke-width="2"/>
    <line x1="20" y1="105" x2="40" y2="105" stroke="#475569" stroke-width="2"/>
    <line x1="107" y1="90" x2="130" y2="90" stroke="#475569" stroke-width="2"/>
    <text x="15" y="79" text-anchor="end" class="b1g-label">A</text>
    <text x="15" y="109" text-anchor="end" class="b1g-label">B</text>
    <text x="135" y="94" text-anchor="start" class="b1g-label">Out</text>

    <!-- Truth table -->
    <text x="105" y="148" text-anchor="middle" class="b1g-label">Truth Table</text>
    <line x1="30" y1="155" x2="180" y2="155" stroke="#cbd5e1" stroke-width="1"/>

    <text x="55" y="175" text-anchor="middle" class="b1g-small">A</text>
    <text x="105" y="175" text-anchor="middle" class="b1g-small">B</text>
    <text x="155" y="175" text-anchor="middle" class="b1g-small">Out</text>

    <text x="55" y="195" text-anchor="middle" class="b1g-zero">0</text>
    <text x="105" y="195" text-anchor="middle" class="b1g-zero">0</text>
    <text x="155" y="195" text-anchor="middle" class="b1g-zero">0</text>

    <text x="55" y="213" text-anchor="middle" class="b1g-zero">0</text>
    <text x="105" y="213" text-anchor="middle" class="b1g-one">1</text>
    <text x="155" y="213" text-anchor="middle" class="b1g-zero">0</text>

    <text x="55" y="231" text-anchor="middle" class="b1g-one">1</text>
    <text x="105" y="231" text-anchor="middle" class="b1g-zero">0</text>
    <text x="155" y="231" text-anchor="middle" class="b1g-zero">0</text>

    <text x="55" y="249" text-anchor="middle" class="b1g-one">1</text>
    <text x="105" y="249" text-anchor="middle" class="b1g-one">1</text>
    <text x="155" y="249" text-anchor="middle" class="b1g-one">1</text>
  </g>

  <!-- OR Gate -->
  <g transform="translate(255, 55)">
    <rect x="0" y="0" width="210" height="260" class="b1g-box"/>
    <text x="105" y="28" text-anchor="middle" class="b1g-gate">OR Gate</text>

    <!-- Gate symbol -->
    <path d="M40,60 Q55,90 40,120 Q80,110 110,90 Q80,70 40,60 Z" class="b1g-shape"/>
    <line x1="20" y1="75" x2="48" y2="75" stroke="#475569" stroke-width="2"/>
    <line x1="20" y1="105" x2="48" y2="105" stroke="#475569" stroke-width="2"/>
    <line x1="110" y1="90" x2="130" y2="90" stroke="#475569" stroke-width="2"/>
    <text x="15" y="79" text-anchor="end" class="b1g-label">A</text>
    <text x="15" y="109" text-anchor="end" class="b1g-label">B</text>
    <text x="135" y="94" text-anchor="start" class="b1g-label">Out</text>

    <!-- Truth table -->
    <text x="105" y="148" text-anchor="middle" class="b1g-label">Truth Table</text>
    <line x1="30" y1="155" x2="180" y2="155" stroke="#cbd5e1" stroke-width="1"/>

    <text x="55" y="175" text-anchor="middle" class="b1g-small">A</text>
    <text x="105" y="175" text-anchor="middle" class="b1g-small">B</text>
    <text x="155" y="175" text-anchor="middle" class="b1g-small">Out</text>

    <text x="55" y="195" text-anchor="middle" class="b1g-zero">0</text>
    <text x="105" y="195" text-anchor="middle" class="b1g-zero">0</text>
    <text x="155" y="195" text-anchor="middle" class="b1g-zero">0</text>

    <text x="55" y="213" text-anchor="middle" class="b1g-zero">0</text>
    <text x="105" y="213" text-anchor="middle" class="b1g-one">1</text>
    <text x="155" y="213" text-anchor="middle" class="b1g-one">1</text>

    <text x="55" y="231" text-anchor="middle" class="b1g-one">1</text>
    <text x="105" y="231" text-anchor="middle" class="b1g-zero">0</text>
    <text x="155" y="231" text-anchor="middle" class="b1g-one">1</text>

    <text x="55" y="249" text-anchor="middle" class="b1g-one">1</text>
    <text x="105" y="249" text-anchor="middle" class="b1g-one">1</text>
    <text x="155" y="249" text-anchor="middle" class="b1g-one">1</text>
  </g>

  <!-- NOT Gate -->
  <g transform="translate(490, 55)">
    <rect x="0" y="0" width="210" height="260" class="b1g-box"/>
    <text x="105" y="28" text-anchor="middle" class="b1g-gate">NOT Gate</text>

    <!-- Gate symbol -->
    <path d="M40,60 L40,120 L100,90 Z" class="b1g-shape"/>
    <circle cx="108" cy="90" r="6" fill="#fff" stroke="#0175C2" stroke-width="2"/>
    <line x1="20" y1="90" x2="40" y2="90" stroke="#475569" stroke-width="2"/>
    <line x1="114" y1="90" x2="130" y2="90" stroke="#475569" stroke-width="2"/>
    <text x="15" y="94" text-anchor="end" class="b1g-label">A</text>
    <text x="135" y="94" text-anchor="start" class="b1g-label">Out</text>

    <!-- Truth table -->
    <text x="105" y="148" text-anchor="middle" class="b1g-label">Truth Table</text>
    <line x1="30" y1="155" x2="180" y2="155" stroke="#cbd5e1" stroke-width="1"/>

    <text x="70" y="175" text-anchor="middle" class="b1g-small">A</text>
    <text x="140" y="175" text-anchor="middle" class="b1g-small">Out</text>

    <text x="70" y="205" text-anchor="middle" class="b1g-zero">0</text>
    <text x="140" y="205" text-anchor="middle" class="b1g-one">1</text>

    <text x="70" y="235" text-anchor="middle" class="b1g-one">1</text>
    <text x="140" y="235" text-anchor="middle" class="b1g-zero">0</text>
  </g>
</svg>