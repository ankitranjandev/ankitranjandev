<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="List int vs Int32List memory layout comparison">
  <defs>
    <marker id="arrowhead-3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .title { font-size: 16px; font-weight: 600; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .label { font-size: 11px; fill: #64748b; }
    .mono { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 13px; }
    .small-mono { font-family: "SF Mono", Menlo, monospace; font-size: 11px; }
    .memory-note-bad { font-size: 13px; font-weight: 600; fill: #b45309; }
    .memory-note-good { font-size: 13px; font-weight: 600; fill: #059669; }
    .caption { font-size: 13px; fill: #475569; font-style: italic; }
  </style>

  <!-- ============ TOP: List<int> ============ -->
  <text x="20" y="28" class="title">List&lt;int&gt; — 8 elements</text>
  <text x="20" y="48" class="subtitle">pointer-sized slots, with some values boxed into Mint heap objects</text>

  <!-- 8 slots, each 80 wide -->
  <!-- Slot 0: 42 (Smi inline) -->
  <rect x="20" y="65" width="80" height="50" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="60" y="95" text-anchor="middle" class="mono">42</text>

  <!-- Slot 1: pointer to Mint -->
  <rect x="100" y="65" width="80" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
  <text x="140" y="88" text-anchor="middle" class="label">ptr</text>
  <text x="140" y="104" text-anchor="middle" class="small-mono">0xA1B…</text>

  <!-- Slot 2: 7 -->
  <rect x="180" y="65" width="80" height="50" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="220" y="95" text-anchor="middle" class="mono">7</text>

  <!-- Slot 3: 1000 -->
  <rect x="260" y="65" width="80" height="50" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="300" y="95" text-anchor="middle" class="mono">1000</text>

  <!-- Slot 4: pointer to Mint -->
  <rect x="340" y="65" width="80" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
  <text x="380" y="88" text-anchor="middle" class="label">ptr</text>
  <text x="380" y="104" text-anchor="middle" class="small-mono">0xC3D…</text>

  <!-- Slot 5: -3 -->
  <rect x="420" y="65" width="80" height="50" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="460" y="95" text-anchor="middle" class="mono">-3</text>

  <!-- Slot 6: 99 -->
  <rect x="500" y="65" width="80" height="50" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="540" y="95" text-anchor="middle" class="mono">99</text>

  <!-- Slot 7: 256 -->
  <rect x="580" y="65" width="80" height="50" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="620" y="95" text-anchor="middle" class="mono">256</text>

  <!-- Arrows down to Mint heap objects -->
  <line x1="140" y1="120" x2="140" y2="148" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead-3)"/>
  <line x1="380" y1="120" x2="380" y2="148" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead-3)"/>

  <!-- Mint boxes -->
  <rect x="95" y="155" width="90" height="35" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
  <text x="140" y="170" text-anchor="middle" class="label">Mint</text>
  <text x="140" y="184" text-anchor="middle" class="small-mono">9000000000</text>

  <rect x="335" y="155" width="90" height="35" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
  <text x="380" y="170" text-anchor="middle" class="label">Mint</text>
  <text x="380" y="184" text-anchor="middle" class="small-mono">5000000000</text>

  <!-- Memory note for List<int> -->
  <text x="20" y="218" class="memory-note-bad">~64 bytes of slots + heap objects, scattered across memory</text>

  <!-- Separator -->
  <line x1="20" y1="240" x2="700" y2="240" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ============ BOTTOM: Int32List ============ -->
  <text x="20" y="270" class="title">Int32List — 8 elements</text>
  <text x="20" y="290" class="subtitle">raw 4-byte cells, packed contiguously, no boxing</text>

  <!-- 8 packed 4-byte cells, each 40 wide -->
  <rect x="20" y="310" width="40" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="2"/>
  <text x="40" y="335" text-anchor="middle" class="small-mono">42</text>

  <rect x="60" y="310" width="40" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="2"/>
  <text x="80" y="335" text-anchor="middle" class="small-mono">8400</text>

  <rect x="100" y="310" width="40" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="2"/>
  <text x="120" y="335" text-anchor="middle" class="small-mono">7</text>

  <rect x="140" y="310" width="40" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="2"/>
  <text x="160" y="335" text-anchor="middle" class="small-mono">1000</text>

  <rect x="180" y="310" width="40" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="2"/>
  <text x="200" y="335" text-anchor="middle" class="small-mono">9999</text>

  <rect x="220" y="310" width="40" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="2"/>
  <text x="240" y="335" text-anchor="middle" class="small-mono">-3</text>

  <rect x="260" y="310" width="40" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="2"/>
  <text x="280" y="335" text-anchor="middle" class="small-mono">99</text>

  <rect x="300" y="310" width="40" height="40" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="2"/>
  <text x="320" y="335" text-anchor="middle" class="small-mono">256</text>

  <!-- Length indicator -->
  <line x1="20" y1="362" x2="340" y2="362" stroke="#64748b" stroke-width="1"/>
  <line x1="20" y1="358" x2="20" y2="366" stroke="#64748b" stroke-width="1"/>
  <line x1="340" y1="358" x2="340" y2="366" stroke="#64748b" stroke-width="1"/>
  <text x="180" y="378" text-anchor="middle" class="label">32 bytes total — all contiguous</text>

  <!-- Memory note -->
  <text x="20" y="408" class="memory-note-good">Half the memory. Cache-friendly. No GC pressure.</text>
</svg>
