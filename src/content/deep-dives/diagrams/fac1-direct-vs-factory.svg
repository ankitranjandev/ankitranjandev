<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="A direct constructor binds the caller to one concrete class, while a factory lets the caller ask an interface and the factory picks the concrete type" style="max-width: 100%; height: auto;"><style>.fac1-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.fac1-title{font-size:16px;font-weight:600}.fac1-bad{font-size:13px;font-weight:600;fill:#dc2626}.fac1-good{font-size:13px;font-weight:600;fill:#10b981}.fac1-h{font-size:13px;font-weight:600}.fac1-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#475569}.fac1-label{font-size:11px;fill:#64748b}</style><text x="360" y="28" text-anchor="middle" class="fac1-t fac1-title">Bound to one concrete, or asking an interface</text><rect x="30" y="50" width="320" height="266" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="76" text-anchor="middle" class="fac1-t fac1-bad">Direct constructor</text><rect x="118" y="92" width="144" height="42" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="6"/><text x="190" y="118" text-anchor="middle" class="fac1-t fac1-h">caller</text><line x1="190" y1="134" x2="190" y2="176" stroke="#dc2626" stroke-width="2" marker-end="url(#fac1-r)"/><text x="280" y="160" text-anchor="middle" class="fac1-t fac1-mn">new ConcreteA()</text><rect x="118" y="178" width="144" height="42" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="6"/><text x="190" y="204" text-anchor="middle" class="fac1-t fac1-mn">ConcreteA</text><text x="190" y="262" text-anchor="middle" class="fac1-t fac1-label">The caller names the class itself.</text><text x="190" y="284" text-anchor="middle" class="fac1-t fac1-label">Change the class, change every caller.</text><rect x="370" y="50" width="320" height="266" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="76" text-anchor="middle" class="fac1-t fac1-good">Factory</text><rect x="458" y="92" width="144" height="42" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="6"/><text x="530" y="118" text-anchor="middle" class="fac1-t fac1-h">caller</text><line x1="530" y1="134" x2="530" y2="160" stroke="#9333ea" stroke-width="2" marker-end="url(#fac1-p)"/><text x="618" y="152" text-anchor="middle" class="fac1-t fac1-mn">Shape(kind)</text><rect x="446" y="162" width="168" height="42" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="6"/><text x="530" y="183" text-anchor="middle" class="fac1-t fac1-h">Shape</text><text x="530" y="198" text-anchor="middle" class="fac1-t fac1-label">interface + factory</text><line x1="478" y1="204" x2="430" y2="244" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#fac1-g)"/><line x1="582" y1="204" x2="630" y2="244" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#fac1-g)"/><rect x="390" y="246" width="86" height="38" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="433" y="270" text-anchor="middle" class="fac1-t fac1-mn">Circle</text><rect x="584" y="246" width="86" height="38" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="627" y="270" text-anchor="middle" class="fac1-t fac1-mn">Square</text><text x="530" y="304" text-anchor="middle" class="fac1-t fac1-label">The factory picks the concrete. The caller never knows.</text><defs><marker id="fac1-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/></marker><marker id="fac1-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker><marker id="fac1-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker></defs></svg>