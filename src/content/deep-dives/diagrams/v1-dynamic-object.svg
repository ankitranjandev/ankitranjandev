<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" style="max-width: 100%; height: auto;" role="img" aria-label="Comparison of dynamic and Object types">
  <style>
    .v1d-title { font: bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .v1d-label { font: bold 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .v1d-code { font: 600 12px "SF Mono", Menlo, Monaco, monospace; fill: #1e293b; }
    .v1d-desc { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #64748b; }
    .v1d-warn { font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #dc2626; }
    .v1d-safe { font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #10b981; }
  </style>

  <text x="360" y="28" text-anchor="middle" class="v1d-title">dynamic vs Object — Escaping the Type System</text>

  <!-- dynamic -->
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="300" height="190" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="8"/>
    <text x="150" y="28" text-anchor="middle" class="v1d-label">dynamic</text>
    <line x1="20" y1="40" x2="280" y2="40" stroke="#dc2626" stroke-width="1"/>

    <text x="20" y="65" class="v1d-code">dynamic value = 'hello';</text>
    <text x="20" y="85" class="v1d-code">value = 42;</text>
    <text x="200" y="85" class="v1d-desc">// OK</text>
    <text x="20" y="105" class="v1d-code">value = true;</text>
    <text x="200" y="105" class="v1d-desc">// OK</text>

    <text x="20" y="135" class="v1d-code">value.foo();</text>
    <text x="130" y="135" class="v1d-desc">// Compiles! Crashes at runtime</text>

    <rect x="20" y="155" width="260" height="25" fill="#fef2f2" rx="4"/>
    <text x="150" y="172" text-anchor="middle" class="v1d-warn">⚠ No compile-time checks</text>
  </g>

  <!-- Object -->
  <g transform="translate(380, 50)">
    <rect x="0" y="0" width="300" height="190" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
    <text x="150" y="28" text-anchor="middle" class="v1d-label">Object</text>
    <line x1="20" y1="40" x2="280" y2="40" stroke="#10b981" stroke-width="1"/>

    <text x="20" y="65" class="v1d-code">Object value = 'hello';</text>
    <text x="20" y="85" class="v1d-code">value = 42;</text>
    <text x="200" y="85" class="v1d-desc">// OK</text>
    <text x="20" y="105" class="v1d-code">value = true;</text>
    <text x="200" y="105" class="v1d-desc">// OK</text>

    <text x="20" y="135" class="v1d-code">value.foo();</text>
    <text x="130" y="135" class="v1d-desc">// Compile error!</text>

    <rect x="20" y="155" width="260" height="25" fill="#ecfdf5" rx="4"/>
    <text x="150" y="172" text-anchor="middle" class="v1d-safe">✓ Only Object methods allowed</text>
  </g>
</svg>