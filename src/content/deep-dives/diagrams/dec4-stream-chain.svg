<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="A source stream flows through a where wrapper then a map wrapper to the result, each stage a thin stream that wraps the one before it and adds a single step" style="max-width: 100%; height: auto;"><style>.dec4-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.dec4-title{font-size:16px;font-weight:600}.dec4-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#1e293b}.dec4-out{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#065f46}.dec4-tag{font-size:11px;font-weight:600;fill:#9333ea}.dec4-label{font-size:12px;fill:#64748b}.dec4-cap{font-size:12px;fill:#64748b}</style><text x="360" y="28" text-anchor="middle" class="dec4-t dec4-title">Each stage wraps the stream before it, adds one step</text><rect x="24" y="92" width="150" height="58" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" rx="8"/><text x="99" y="116" text-anchor="middle" class="dec4-t dec4-label">source</text><text x="99" y="138" text-anchor="middle" class="dec4-t dec4-mn">[1,2,3,4]</text><line x1="174" y1="121" x2="206" y2="121" stroke="#94a3b8" stroke-width="2" marker-end="url(#dec4-a)"/><rect x="208" y="84" width="150" height="74" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="8"/><text x="283" y="104" text-anchor="middle" class="dec4-t dec4-tag">wraps source</text><text x="283" y="128" text-anchor="middle" class="dec4-t dec4-mn">.where(odd)</text><text x="283" y="148" text-anchor="middle" class="dec4-t dec4-out">[1,3]</text><line x1="358" y1="121" x2="390" y2="121" stroke="#94a3b8" stroke-width="2" marker-end="url(#dec4-a)"/><rect x="392" y="84" width="150" height="74" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="8"/><text x="467" y="104" text-anchor="middle" class="dec4-t dec4-tag">wraps where</text><text x="467" y="128" text-anchor="middle" class="dec4-t dec4-mn">.map(x10)</text><text x="467" y="148" text-anchor="middle" class="dec4-t dec4-out">[10,30]</text><line x1="542" y1="121" x2="574" y2="121" stroke="#94a3b8" stroke-width="2" marker-end="url(#dec4-a)"/><rect x="576" y="92" width="120" height="58" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/><text x="636" y="116" text-anchor="middle" class="dec4-t dec4-label">result</text><text x="636" y="138" text-anchor="middle" class="dec4-t dec4-out">10, then 30</text><text x="360" y="206" text-anchor="middle" class="dec4-t dec4-mn">source.where(isOdd).map((x) =&gt; x * 10)</text><text x="360" y="244" text-anchor="middle" class="dec4-t dec4-cap">Same Stream interface at every stage. map and where each return a new stream that wraps the last —</text><text x="360" y="264" text-anchor="middle" class="dec4-t dec4-cap">lazy, so nothing flows until something listens. The widget onion, laid out sideways.</text><defs><marker id="dec4-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker></defs></svg>
