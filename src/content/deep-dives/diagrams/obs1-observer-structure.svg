<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="The observer pattern structure: a subject holds a list of observers and notifies each one when its state changes" style="max-width: 100%; height: auto;"><style>.ob1-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.ob1-title{font-size:16px;font-weight:600}.ob1-h{font-size:14px;font-weight:600}.ob1-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#1e293b}.ob1-label{font-size:12px;fill:#64748b}.ob1-cap{font-size:12px;fill:#64748b}</style><text x="360" y="30" text-anchor="middle" class="ob1-t ob1-title">One subject, many observers</text><rect x="44" y="78" width="210" height="210" fill="#f3e8ff" stroke="#9333ea" stroke-width="2" rx="8"/><text x="149" y="106" text-anchor="middle" class="ob1-t ob1-h">Subject</text><text x="149" y="124" text-anchor="middle" class="ob1-t ob1-label">holds the state</text><rect x="64" y="142" width="170" height="126" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5" rx="6"/><text x="149" y="162" text-anchor="middle" class="ob1-t ob1-mn">_observers</text><rect x="80" y="176" width="138" height="24" fill="#ede9fe" stroke="#a78bfa" stroke-width="1" rx="4"/><text x="149" y="192" text-anchor="middle" class="ob1-t ob1-mn">&#8594; Observer A</text><rect x="80" y="206" width="138" height="24" fill="#ede9fe" stroke="#a78bfa" stroke-width="1" rx="4"/><text x="149" y="222" text-anchor="middle" class="ob1-t ob1-mn">&#8594; Observer B</text><rect x="80" y="236" width="138" height="24" fill="#ede9fe" stroke="#a78bfa" stroke-width="1" rx="4"/><text x="149" y="252" text-anchor="middle" class="ob1-t ob1-mn">&#8594; Observer C</text><rect x="500" y="78" width="176" height="54" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/><text x="588" y="103" text-anchor="middle" class="ob1-t ob1-h">Observer A</text><text x="588" y="121" text-anchor="middle" class="ob1-t ob1-label">rebuilds UI</text><rect x="500" y="153" width="176" height="54" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/><text x="588" y="178" text-anchor="middle" class="ob1-t ob1-h">Observer B</text><text x="588" y="196" text-anchor="middle" class="ob1-t ob1-label">logs the change</text><rect x="500" y="228" width="176" height="54" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/><text x="588" y="253" text-anchor="middle" class="ob1-t ob1-h">Observer C</text><text x="588" y="271" text-anchor="middle" class="ob1-t ob1-label">saves to disk</text><line x1="254" y1="172" x2="500" y2="105" stroke="#9333ea" stroke-width="2" marker-end="url(#ob1-arr)"/><line x1="254" y1="183" x2="500" y2="180" stroke="#9333ea" stroke-width="2" marker-end="url(#ob1-arr)"/><line x1="254" y1="194" x2="500" y2="255" stroke="#9333ea" stroke-width="2" marker-end="url(#ob1-arr)"/><text x="377" y="120" text-anchor="middle" class="ob1-t ob1-label">notify()</text><text x="340" y="345" text-anchor="middle" class="ob1-t ob1-cap">One change fans out to every observer. The subject never knows what they do with it.</text><defs><marker id="ob1-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker></defs></svg>