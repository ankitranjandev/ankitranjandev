<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="Interface class vs abstract class" style="max-width: 100%; height: auto;">
  <style>
    .cm3-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:var(--svg-text, #1e293b)}
    .cm3-title{font-size:15px;font-weight:600}
    .cm3-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px}
    .cm3-label{font-size:11px;fill:var(--svg-text-muted, #64748b)}
    .cm3-desc{font-size:10px;fill:var(--svg-text-secondary, #475569)}
  </style>

  <text x="360" y="24" text-anchor="middle" class="cm3-t cm3-title">interface class vs abstract class — different constraints</text>

  <!-- interface class side -->
  <rect x="40" y="50" width="300" height="240" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" stroke-width="2" rx="8"/>
  <text x="190" y="78" text-anchor="middle" class="cm3-t cm3-mn" fill="var(--svg-green-dark, #059669)" font-weight="600">interface class Logger</text>

  <text x="60" y="110" class="cm3-t cm3-desc">Can implement (use as contract):</text>
  <rect x="60" y="120" width="260" height="35" fill="var(--svg-bg, #ffffff)" stroke="var(--svg-green, #10b981)" rx="4"/>
  <text x="190" y="143" text-anchor="middle" class="cm3-t cm3-mn" fill="var(--svg-green, #10b981)">class FileLogger implements Logger</text>

  <text x="60" y="175" class="cm3-t cm3-desc">Cannot extend (outside library):</text>
  <rect x="60" y="185" width="260" height="35" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" rx="4" opacity="0.6"/>
  <text x="190" y="208" text-anchor="middle" class="cm3-t cm3-mn" fill="var(--svg-red, #dc2626)">class MyLogger extends Logger</text>
  <line x1="60" y1="185" x2="320" y2="220" stroke="var(--svg-red, #dc2626)" stroke-width="2"/>

  <text x="60" y="255" class="cm3-t cm3-desc">Can construct:</text>
  <rect x="60" y="265" width="130" height="20" fill="var(--svg-bg, #ffffff)" stroke="var(--svg-green, #10b981)" rx="4"/>
  <text x="125" y="280" text-anchor="middle" class="cm3-t cm3-mn" fill="var(--svg-green, #10b981)">Logger()</text>

  <!-- abstract class side -->
  <rect x="380" y="50" width="300" height="240" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" stroke-width="2" rx="8"/>
  <text x="530" y="78" text-anchor="middle" class="cm3-t cm3-mn" fill="var(--svg-dart-blue, #0175C2)" font-weight="600">abstract class Logger</text>

  <text x="400" y="110" class="cm3-t cm3-desc">Can implement:</text>
  <rect x="400" y="120" width="260" height="35" fill="var(--svg-bg, #ffffff)" stroke="var(--svg-green, #10b981)" rx="4"/>
  <text x="530" y="143" text-anchor="middle" class="cm3-t cm3-mn" fill="var(--svg-green, #10b981)">class FileLogger implements Logger</text>

  <text x="400" y="175" class="cm3-t cm3-desc">Can also extend:</text>
  <rect x="400" y="185" width="260" height="35" fill="var(--svg-bg, #ffffff)" stroke="var(--svg-green, #10b981)" rx="4"/>
  <text x="530" y="208" text-anchor="middle" class="cm3-t cm3-mn" fill="var(--svg-green, #10b981)">class MyLogger extends Logger</text>

  <text x="400" y="255" class="cm3-t cm3-desc">Cannot construct:</text>
  <rect x="400" y="265" width="130" height="20" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" rx="4" opacity="0.6"/>
  <text x="465" y="280" text-anchor="middle" class="cm3-t cm3-mn" fill="var(--svg-red, #dc2626)">Logger()</text>
  <line x1="400" y1="265" x2="530" y2="285" stroke="var(--svg-red, #dc2626)" stroke-width="2"/>

  <text x="360" y="310" text-anchor="middle" class="cm3-t cm3-label">interface = contract only | abstract = template for extension</text>
</svg>
