<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 350" role="img" aria-label="The three parts of the Dart singleton idiom: a private constructor, a static final instance field, and a factory constructor that returns that field" style="max-width: 100%; height: auto;"><style>.sng2-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.sng2-title{font-size:16px;font-weight:600}.sng2-h{font-size:13px;font-weight:600;fill:#9333ea}.sng2-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#1e293b}.sng2-label{font-size:11px;fill:#64748b}.sng2-cap{font-size:12px;fill:#64748b}</style><text x="360" y="28" text-anchor="middle" class="sng2-t sng2-title">Three parts lock the count to one</text><rect x="40" y="50" width="640" height="56" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5" rx="8"/><text x="60" y="74" class="sng2-t sng2-h">1. Private constructor</text><text x="60" y="96" class="sng2-t sng2-mn">Logger._();</text><text x="660" y="74" text-anchor="end" class="sng2-t sng2-label">the underscore hides it — no outside code can call new</text><rect x="40" y="120" width="640" height="56" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5" rx="8"/><text x="60" y="144" class="sng2-t sng2-h">2. Static final instance</text><text x="60" y="166" class="sng2-t sng2-mn">static final Logger _instance = Logger._();</text><text x="660" y="144" text-anchor="end" class="sng2-t sng2-label">built once, lazily, on first access</text><rect x="40" y="190" width="640" height="56" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5" rx="8"/><text x="60" y="214" class="sng2-t sng2-h">3. Factory constructor</text><text x="60" y="236" class="sng2-t sng2-mn">factory Logger() =&gt; _instance;</text><text x="660" y="214" text-anchor="end" class="sng2-t sng2-label">Logger() returns the field, never a new object</text><rect x="180" y="270" width="160" height="44" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="6"/><text x="260" y="297" text-anchor="middle" class="sng2-t sng2-mn">Logger()</text><line x1="340" y1="292" x2="394" y2="292" stroke="#9333ea" stroke-width="2" marker-end="url(#sng2-a)"/><rect x="400" y="270" width="160" height="44" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/><text x="480" y="297" text-anchor="middle" class="sng2-t sng2-mn">_instance</text><text x="360" y="338" text-anchor="middle" class="sng2-t sng2-cap">The factory is the gate. Every call walks back to the same instance.</text><defs><marker id="sng2-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker></defs></svg>
