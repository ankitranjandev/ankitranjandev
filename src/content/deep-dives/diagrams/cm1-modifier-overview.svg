<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="Dart 3 class modifiers overview" style="max-width: 100%; height: auto;">
  <style>
    .cm1-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:var(--svg-text, #1e293b)}
    .cm1-title{font-size:16px;font-weight:600}
    .cm1-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px}
    .cm1-label{font-size:11px;fill:var(--svg-text-muted, #64748b)}
    .cm1-desc{font-size:10px;fill:var(--svg-text-secondary, #475569)}
  </style>

  <text x="360" y="26" text-anchor="middle" class="cm1-t cm1-title">Dart 3 Class Modifiers — What Each One Controls</text>

  <!-- Column headers -->
  <text x="120" y="60" text-anchor="middle" class="cm1-t cm1-label" font-weight="600">Modifier</text>
  <text x="320" y="60" text-anchor="middle" class="cm1-t cm1-label" font-weight="600">Can Extend?</text>
  <text x="480" y="60" text-anchor="middle" class="cm1-t cm1-label" font-weight="600">Can Implement?</text>
  <text x="640" y="60" text-anchor="middle" class="cm1-t cm1-label" font-weight="600">Can Construct?</text>

  <line x1="40" y1="75" x2="680" y2="75" stroke="var(--svg-border, #cbd5e1)" stroke-width="1"/>

  <!-- Row 1: (none) -->
  <rect x="40" y="85" width="160" height="40" fill="var(--svg-bg-secondary, #f1f5f9)" stroke="var(--svg-border, #cbd5e1)" rx="4"/>
  <text x="120" y="110" text-anchor="middle" class="cm1-t cm1-mn">(no modifier)</text>
  <text x="320" y="110" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green, #10b981)">Yes</text>
  <text x="480" y="110" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green, #10b981)">Yes</text>
  <text x="640" y="110" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green, #10b981)">Yes</text>

  <!-- Row 2: abstract -->
  <rect x="40" y="135" width="160" height="40" fill="var(--svg-dart-blue-fill, #dbeafe)" stroke="var(--svg-dart-blue, #0175C2)" rx="4"/>
  <text x="120" y="160" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-dart-blue, #0175C2)">abstract</text>
  <text x="320" y="160" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green, #10b981)">Yes</text>
  <text x="480" y="160" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green, #10b981)">Yes</text>
  <text x="640" y="160" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-red, #dc2626)">No</text>

  <!-- Row 3: base -->
  <rect x="40" y="185" width="160" height="40" fill="var(--svg-amber-fill, #fef3c7)" stroke="var(--svg-amber, #f59e0b)" rx="4"/>
  <text x="120" y="210" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-amber-dark, #d97706)">base</text>
  <text x="320" y="210" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green, #10b981)">Yes</text>
  <text x="480" y="210" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-red, #dc2626)">No*</text>
  <text x="640" y="210" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green, #10b981)">Yes</text>

  <!-- Row 4: interface -->
  <rect x="40" y="235" width="160" height="40" fill="var(--svg-green-fill, #d1fae5)" stroke="var(--svg-green, #10b981)" rx="4"/>
  <text x="120" y="260" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green-dark, #059669)">interface</text>
  <text x="320" y="260" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-red, #dc2626)">No*</text>
  <text x="480" y="260" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green, #10b981)">Yes</text>
  <text x="640" y="260" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green, #10b981)">Yes</text>

  <!-- Row 5: final -->
  <rect x="40" y="285" width="160" height="40" fill="var(--svg-red-fill, #fee2e2)" stroke="var(--svg-red, #dc2626)" rx="4"/>
  <text x="120" y="310" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-red, #dc2626)">final</text>
  <text x="320" y="310" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-red, #dc2626)">No*</text>
  <text x="480" y="310" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-red, #dc2626)">No*</text>
  <text x="640" y="310" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-green, #10b981)">Yes</text>

  <!-- Row 6: sealed -->
  <rect x="40" y="335" width="160" height="40" fill="var(--svg-purple-fill, #e9d5ff)" stroke="var(--svg-purple, #9333ea)" rx="4"/>
  <text x="120" y="360" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-purple-dark, #7c3aed)">sealed</text>
  <text x="320" y="360" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-amber, #f59e0b)">Same file</text>
  <text x="480" y="360" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-amber, #f59e0b)">Same file</text>
  <text x="640" y="360" text-anchor="middle" class="cm1-t cm1-mn" fill="var(--svg-red, #dc2626)">No</text>

  <text x="360" y="400" text-anchor="middle" class="cm1-t cm1-desc">* Restrictions apply outside the library where the class is defined</text>
</svg>
