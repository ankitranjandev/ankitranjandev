<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="What does empty curly braces mean in Dart">
  <style>
    .d-em-t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #1e293b; }
    .d-em-title { font-size: 16px; font-weight: 600; }
    .d-em-code { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 17px; font-weight: 700; }
    .d-em-arrow { font-size: 18px; font-weight: 700; fill: #475569; }
    .d-em-type { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 12px; font-weight: 700; }
    .d-em-note { font-size: 10px; font-style: italic; fill: #64748b; }
    .d-em-warn { font-size: 13px; font-weight: 600; fill: #b45309; }
  </style>

  <text x="360" y="26" text-anchor="middle" class="d-em-t d-em-title">What does {} mean? It depends on the context.</text>

  <!-- Panel 1: {} -->
  <rect x="20" y="55" width="160" height="210" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="100" y="115" text-anchor="middle" class="d-em-t d-em-code">{}</text>
  <text x="100" y="155" text-anchor="middle" class="d-em-t d-em-arrow">↓</text>
  <text x="100" y="190" text-anchor="middle" class="d-em-t d-em-type" fill="#9333ea">Map</text>
  <text x="100" y="208" text-anchor="middle" class="d-em-t d-em-type" fill="#9333ea">&lt;dynamic, dynamic&gt;</text>
  <text x="100" y="235" text-anchor="middle" class="d-em-t d-em-note">empty Map,</text>
  <text x="100" y="250" text-anchor="middle" class="d-em-t d-em-note">NOT empty Set</text>

  <!-- Panel 2: <int>{} -->
  <rect x="200" y="55" width="160" height="210" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="280" y="115" text-anchor="middle" class="d-em-t d-em-code">&lt;int&gt;{}</text>
  <text x="280" y="155" text-anchor="middle" class="d-em-t d-em-arrow">↓</text>
  <text x="280" y="200" text-anchor="middle" class="d-em-t d-em-type" fill="#10b981">Set&lt;int&gt;</text>
  <text x="280" y="235" text-anchor="middle" class="d-em-t d-em-note">explicit type tells</text>
  <text x="280" y="250" text-anchor="middle" class="d-em-t d-em-note">Dart it is a Set</text>

  <!-- Panel 3: {1, 2, 3} -->
  <rect x="380" y="55" width="160" height="210" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="460" y="115" text-anchor="middle" class="d-em-t d-em-code">{1, 2, 3}</text>
  <text x="460" y="155" text-anchor="middle" class="d-em-t d-em-arrow">↓</text>
  <text x="460" y="200" text-anchor="middle" class="d-em-t d-em-type" fill="#10b981">Set&lt;int&gt;</text>
  <text x="460" y="235" text-anchor="middle" class="d-em-t d-em-note">commas → Set</text>
  <text x="460" y="250" text-anchor="middle" class="d-em-t d-em-note">(no colons)</text>

  <!-- Panel 4: {1: 'a'} -->
  <rect x="560" y="55" width="140" height="210" fill="#f3e8ff" stroke="#9333ea" stroke-width="2" rx="6"/>
  <text x="630" y="115" text-anchor="middle" class="d-em-t d-em-code">{1: 'a'}</text>
  <text x="630" y="155" text-anchor="middle" class="d-em-t d-em-arrow">↓</text>
  <text x="630" y="190" text-anchor="middle" class="d-em-t d-em-type" fill="#9333ea">Map</text>
  <text x="630" y="208" text-anchor="middle" class="d-em-t d-em-type" fill="#9333ea">&lt;int, String&gt;</text>
  <text x="630" y="235" text-anchor="middle" class="d-em-t d-em-note">key:value pairs</text>
  <text x="630" y="250" text-anchor="middle" class="d-em-t d-em-note">→ Map</text>

  <!-- Bottom rule -->
  <text x="360" y="295" text-anchor="middle" class="d-em-t d-em-warn">Rule: bare {} defaults to Map. For an empty Set, write &lt;Type&gt;{} or Set&lt;Type&gt;().</text>
</svg>
