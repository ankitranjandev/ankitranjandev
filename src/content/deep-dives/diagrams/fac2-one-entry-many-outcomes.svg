<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" role="img" aria-label="A single factory constructor has one entry point but several outcomes: it can return a cached instance, build a fresh one, or choose a subtype" style="max-width: 100%; height: auto;"><style>.fac2-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.fac2-title{font-size:16px;font-weight:600}.fac2-h{font-size:13px;font-weight:600}.fac2-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:12px;fill:#475569}.fac2-label{font-size:11px;fill:#64748b}.fac2-cap{font-size:12px;fill:#64748b}</style><text x="360" y="28" text-anchor="middle" class="fac2-t fac2-title">One entry point, several outcomes</text><rect x="262" y="54" width="196" height="50" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="8"/><text x="360" y="76" text-anchor="middle" class="fac2-t fac2-h">factory Logger(name)</text><text x="360" y="94" text-anchor="middle" class="fac2-t fac2-label">the one call site</text><line x1="300" y1="104" x2="150" y2="158" stroke="#9333ea" stroke-width="2" marker-end="url(#fac2-p)"/><line x1="360" y1="104" x2="360" y2="158" stroke="#9333ea" stroke-width="2" marker-end="url(#fac2-p)"/><line x1="420" y1="104" x2="570" y2="158" stroke="#9333ea" stroke-width="2" marker-end="url(#fac2-p)"/><rect x="42" y="160" width="200" height="86" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="8"/><text x="142" y="186" text-anchor="middle" class="fac2-t fac2-h">Cached</text><text x="142" y="208" text-anchor="middle" class="fac2-t fac2-mn">return _cache[name]</text><text x="142" y="230" text-anchor="middle" class="fac2-t fac2-label">same object returned</text><rect x="260" y="160" width="200" height="86" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="8"/><text x="360" y="186" text-anchor="middle" class="fac2-t fac2-h">Fresh</text><text x="360" y="208" text-anchor="middle" class="fac2-t fac2-mn">return Logger._(name)</text><text x="360" y="230" text-anchor="middle" class="fac2-t fac2-label">a brand new instance</text><rect x="478" y="160" width="200" height="86" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5" rx="8"/><text x="578" y="186" text-anchor="middle" class="fac2-t fac2-h">Subtype</text><text x="578" y="208" text-anchor="middle" class="fac2-t fac2-mn">return FileLogger()</text><text x="578" y="230" text-anchor="middle" class="fac2-t fac2-label">a chosen subclass</text><text x="360" y="288" text-anchor="middle" class="fac2-t fac2-cap">A generative constructor must build a fresh instance.</text><text x="360" y="308" text-anchor="middle" class="fac2-t fac2-cap">A factory is free to return any of these.</text><defs><marker id="fac2-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/></marker></defs></svg>