<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="Inheritance needs a subclass for every combination so class count multiplies, while composition picks one strategy per option so class count only adds" style="max-width: 100%; height: auto;"><style>.str4-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;fill:#1e293b}.str4-title{font-size:16px;font-weight:600}.str4-bad{font-size:13px;font-weight:600;fill:#dc2626}.str4-good{font-size:13px;font-weight:600;fill:#10b981}.str4-h{font-size:12px;font-weight:600}.str4-mn{font-family:"SF Mono",Menlo,Monaco,monospace;font-size:11px;fill:#475569}.str4-label{font-size:11px;fill:#64748b}.str4-dots{font-size:18px;font-weight:700;fill:#94a3b8}</style><text x="360" y="28" text-anchor="middle" class="str4-t str4-title">Inheritance multiplies. Composition adds.</text><rect x="30" y="48" width="320" height="268" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" rx="10"/><text x="190" y="74" text-anchor="middle" class="str4-t str4-bad">A subclass per combination</text><rect x="148" y="88" width="84" height="30" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="5"/><text x="190" y="108" text-anchor="middle" class="str4-t str4-h">Checkout</text><line x1="190" y1="118" x2="80" y2="146" stroke="#94a3b8" stroke-width="1.2"/><line x1="190" y1="118" x2="190" y2="146" stroke="#94a3b8" stroke-width="1.2"/><line x1="190" y1="118" x2="300" y2="146" stroke="#94a3b8" stroke-width="1.2"/><rect x="44" y="146" width="72" height="28" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="80" y="165" text-anchor="middle" class="str4-t str4-mn">Card</text><rect x="154" y="146" width="72" height="28" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="190" y="165" text-anchor="middle" class="str4-t str4-mn">PayPal</text><rect x="264" y="146" width="72" height="28" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="300" y="165" text-anchor="middle" class="str4-t str4-mn">UPI</text><line x1="80" y1="174" x2="62" y2="198" stroke="#94a3b8" stroke-width="1.2"/><line x1="80" y1="174" x2="104" y2="198" stroke="#94a3b8" stroke-width="1.2"/><rect x="30" y="198" width="68" height="28" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="64" y="217" text-anchor="middle" class="str4-t str4-mn">+ Full</text><rect x="104" y="198" width="74" height="28" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2" rx="5"/><text x="141" y="217" text-anchor="middle" class="str4-t str4-mn">+ Disc</text><text x="190" y="218" text-anchor="middle" class="str4-t str4-dots">…</text><text x="300" y="218" text-anchor="middle" class="str4-t str4-dots">…</text><text x="190" y="268" text-anchor="middle" class="str4-t str4-h">Every combination is a class</text><text x="190" y="292" text-anchor="middle" class="str4-t str4-bad">3 × 2 = 6, and it multiplies</text><rect x="370" y="48" width="320" height="268" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" rx="10"/><text x="530" y="74" text-anchor="middle" class="str4-t str4-good">One option, one class</text><rect x="430" y="86" width="200" height="74" fill="#ede9fe" stroke="#9333ea" stroke-width="2" rx="6"/><text x="530" y="108" text-anchor="middle" class="str4-t str4-h">Checkout</text><text x="530" y="130" text-anchor="middle" class="str4-t str4-mn">pay:   [ Card ]</text><text x="530" y="148" text-anchor="middle" class="str4-t str4-mn">price: [ Full ]</text><text x="530" y="184" text-anchor="middle" class="str4-t str4-label">payment options</text><rect x="392" y="192" width="84" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1.2" rx="5"/><text x="434" y="212" text-anchor="middle" class="str4-t str4-mn">Card</text><rect x="486" y="192" width="84" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1.2" rx="5"/><text x="528" y="212" text-anchor="middle" class="str4-t str4-mn">PayPal</text><rect x="580" y="192" width="84" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1.2" rx="5"/><text x="622" y="212" text-anchor="middle" class="str4-t str4-mn">UPI</text><text x="530" y="244" text-anchor="middle" class="str4-t str4-label">pricing options</text><rect x="440" y="252" width="84" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1.2" rx="5"/><text x="482" y="272" text-anchor="middle" class="str4-t str4-mn">Full</text><rect x="534" y="252" width="110" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1.2" rx="5"/><text x="589" y="272" text-anchor="middle" class="str4-t str4-mn">Discount</text><text x="530" y="306" text-anchor="middle" class="str4-t str4-good">3 + 2 = 5, it just adds</text></svg>